// + 버튼 탭 → 파일 선택
function addImageToBlock(btn) {
  const block = btn.closest('.block-card');
  const fileInput = block.querySelector('input[type="file"]');
  if (fileInput) fileInput.click();
}

// 파일 선택 후 처리 (다중)
async function onImagesSelected(fileInput) {
  const files = [...fileInput.files];
  if (!files.length) return;
  const block = fileInput.closest('.block-card');
  const row = block.querySelector('.image-scroll-row');
  const addBtn = row.querySelector('.image-add-btn');

  for (const file of files) {
    // 로컬 미리보기 먼저 표시
    const localSrc = await new Promise(res => {
      const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file);
    });
    const item = document.createElement('div');
    item.className = 'image-item';
    item.innerHTML = `<img src="${localSrc}" alt=""><button class="image-item-remove" onclick="removeImageItem(this)">✕</button>`;
    row.insertBefore(item, addBtn);

    // Storage 업로드 후 src 교체
    try {
      const url = await uploadImage(file, 'item');
      if (url) item.querySelector('img').src = url;
    } catch (e) {
      console.error('이미지 업로드 실패:', e);
      // 실패 시 로컬 미리보기 유지
    }
  }

  fileInput.value = '';
}

// 이미지 개별 삭제
function removeImageItem(btn) {
  btn.closest('.image-item').remove();
}

// ── Storage 이미지 업로드 ──
async function uploadImage(file, type = 'item') {
  if (!PROJECT_ID) return null;
  const filename = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  let sRef;
  if (type === 'mapBg')      sRef = storageRef.mapBg(PROJECT_ID, filename);
  else if (type === 'setting') sRef = storageRef.settingImage(PROJECT_ID, filename);
  else                         sRef = storageRef.itemImage(PROJECT_ID, filename);
  await sRef.put(file);
  return await sRef.getDownloadURL();
}

// ── Storage 이미지 삭제 (URL로) ──
async function deleteStorageImage(url) {
  if (!url) return;
  try { await storage.refFromURL(url).delete(); } catch (e) { /* 이미 없는 경우 무시 */ }
}

// ── 이미지 전체화면 뷰어 (스와이프) ──
let viewerSrcs = [];
let viewerIndex = 0;
let viewerTouchStartX = 0;

function openImageViewer(srcs, index) {
  viewerSrcs = srcs;
  viewerIndex = index;

  const track = document.getElementById('imageViewerTrack');
  const dots = document.getElementById('imageViewerDots');
  track.innerHTML = '';
  dots.innerHTML = '';

  // 슬라이드 생성
  srcs.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'image-viewer-slide';
    slide.innerHTML = `<img src="${src}" alt="" style="touch-action:none; transition:transform 0.1s;">`;
    // 배경 탭 → 닫기 (이미지 탭은 전파 막기)
    slide.onclick = () => closeImageViewer();
    const img = slide.querySelector('img');
    img.onclick = e => e.stopPropagation();
    // 핀치줌
    attachViewerPinchZoom(img, slide);
    track.appendChild(slide);

    // 도트
    if (srcs.length > 1) {
      const dot = document.createElement('div');
      dot.className = 'image-viewer-dot' + (i === index ? ' active' : '');
      dots.appendChild(dot);
    }
  });

  updateViewerPosition(false);
  document.getElementById('imageViewer').classList.add('open');

  // 스와이프 이벤트
  track.addEventListener('touchstart', onViewerTouchStart, { passive:true });
  track.addEventListener('touchend', onViewerTouchEnd, { passive:true });
}

function attachViewerPinchZoom(img, slide) {
  let scale = 1, lastScale = 1;
  let startDist = 0;
  let originX = 0, originY = 0;
  let translateX = 0, translateY = 0;
  let startTransX = 0, startTransY = 0;
  let isDragging = false;

  function applyTransform() {
    img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  }

  img.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      // 핀치 시작
      const t1 = e.touches[0], t2 = e.touches[1];
      startDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      lastScale = scale;
      originX = (t1.clientX + t2.clientX) / 2;
      originY = (t1.clientY + t2.clientY) / 2;
      e.stopPropagation();
    } else if (e.touches.length === 1 && scale > 1) {
      // 패닝 시작
      isDragging = true;
      startTransX = e.touches[0].clientX - translateX;
      startTransY = e.touches[0].clientY - translateY;
      e.stopPropagation();
    }
  }, { passive:true });

  img.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      scale = Math.min(5, Math.max(1, lastScale * dist / startDist));
      applyTransform();
      e.stopPropagation();
      e.preventDefault();
    } else if (e.touches.length === 1 && isDragging) {
      translateX = e.touches[0].clientX - startTransX;
      translateY = e.touches[0].clientY - startTransY;
      applyTransform();
      e.stopPropagation();
      e.preventDefault();
    }
  }, { passive:false });

  img.addEventListener('touchend', e => {
    isDragging = false;
    if (scale < 1.05) { scale = 1; translateX = 0; translateY = 0; applyTransform(); }
    e.stopPropagation();
  }, { passive:true });

  // 더블탭 줌인/줌아웃
  let lastTap = 0;
  img.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) {
      if (scale > 1) { scale = 1; translateX = 0; translateY = 0; }
      else { scale = 2.5; }
      applyTransform();
      e.stopPropagation();
    }
    lastTap = now;
  }, { passive:true });
}

function closeImageViewer() {
  const overlay = document.getElementById('imageViewer');
  overlay.classList.remove('open');
  const track = document.getElementById('imageViewerTrack');
  track.removeEventListener('touchstart', onViewerTouchStart);
  track.removeEventListener('touchend', onViewerTouchEnd);
}

function updateViewerPosition(animate=true) {
  const track = document.getElementById('imageViewerTrack');
  track.style.transition = animate ? 'transform 0.3s cubic-bezier(0.4,0,0.2,1)' : 'none';
  track.style.transform = `translateX(${-viewerIndex * 100}%)`;
  // 도트 업데이트
  document.querySelectorAll('.image-viewer-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === viewerIndex);
  });
}

function onViewerTouchStart(e) {
  viewerTouchStartX = e.touches[0].clientX;
}

function onViewerTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - viewerTouchStartX;
  if (Math.abs(dx) < 40) return; // 너무 짧은 스와이프 무시
  if (dx < 0 && viewerIndex < viewerSrcs.length - 1) viewerIndex++;
  else if (dx > 0 && viewerIndex > 0) viewerIndex--;
  updateViewerPosition(true);
}

// 목록 렌더
function renderMenuList(filter) {
  const wrap = document.getElementById('menuStoryList');
  wrap.innerHTML = '';

  MENU_DATA.forEach(item => {
    if (item.type === 'group') {
      const children = filter ? item.children.filter(s => s.name.includes(filter)) : item.children;
      const groupMatch = !filter || item.name.includes(filter) || children.length;
      if (!groupMatch) return;
      const expanded = filter ? true : item.expanded;

      wrap.appendChild(makeDropIndicator('top', null, item.id));

      const groupRow = document.createElement('div');
      groupRow.className = 'menu-group-row';
      groupRow.dataset.id = item.id;
      groupRow.dataset.type = 'group';
      groupRow.dataset.expanded = expanded ? 'true' : 'false';
      groupRow.innerHTML = `
        <div class="menu-group-toggle${expanded ? ' expanded' : ''}">
          <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
        </div>
        <div class="menu-group-icon">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="menu-group-name">${item.name}</span>
        <button class="menu-row-more" onclick="openContextPopup(event,'group','${item.id}')">
          <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
        </button>
      `;
      groupRow.querySelector('.menu-group-toggle').addEventListener('click', e => {
        e.stopPropagation();
        item.expanded = !item.expanded;
        renderMenuList();
      });
      groupRow.addEventListener('click', () => {
        item.expanded = !item.expanded;
        renderMenuList();
      });
      attachLongPress(groupRow, item.id, 'group', item.name, 'folder');
      wrap.appendChild(groupRow);

      if (expanded) {
        const childWrap = document.createElement('div');
        childWrap.className = 'menu-group-children';
        childWrap.dataset.groupId = item.id;
        const list = filter ? children : item.children;
        list.forEach(story => {
          childWrap.appendChild(makeDropIndicator('child', item.id, story.id));
          childWrap.appendChild(makeStoryRow(story));
        });
        childWrap.appendChild(makeDropIndicator('child', item.id, null));
        wrap.appendChild(childWrap);
      }

    } else if (item.type === 'story') {
      if (filter && !item.name.includes(filter)) return;
      wrap.appendChild(makeDropIndicator('top', null, item.id));
      wrap.appendChild(makeStoryRow(item, true));
    }
  });
  wrap.appendChild(makeDropIndicator('top', null, null));
}

function makeDropIndicator(level, groupId, beforeId) {
  const el = document.createElement('div');
  el.className = 'menu-drop-indicator';
  el.dataset.level = level || 'top';
  if (groupId) el.dataset.group = groupId;
  if (beforeId) el.dataset.before = beforeId;
  return el;
}

function makeStoryRow(story, noGroup) {
  const row = document.createElement('div');
  row.className = 'menu-story-row' + (story.active ? ' active' : '') + (noGroup ? ' no-group' : '');
  row.dataset.id = story.id;
  row.dataset.type = 'story';
  row.innerHTML = `
    <div class="menu-story-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>
    <span class="menu-story-name">${story.name}</span>
    <button class="menu-row-more" onclick="openContextPopup(event,'story','${story.id}')">
      <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
    </button>
  `;
  row.querySelector('.menu-story-name').addEventListener('click', () => {
    selectStory(story.id);
  });
  attachLongPress(row, story.id, 'story', story.name, 'doc');
  return row;
}

// ── 메뉴 드래그 이동 ──
let menuDrag = null; // { id, type, srcEl, ghost, startX, startY }

function attachLongPress(el, id, type, name, iconType) {
  let timer = null;
  const onStart = e => {
    const touch = e.touches ? e.touches[0] : e;
    timer = setTimeout(() => {
      e.preventDefault();
      startMenuDrag(id, type, name, iconType, el, touch.clientX, touch.clientY);
    }, 500);
  };
  const onCancel = () => { clearTimeout(timer); timer = null; };
  el.addEventListener('touchstart', onStart, { passive: true });
  el.addEventListener('touchend', onCancel);
  el.addEventListener('touchmove', onCancel, { passive: true });
  el.addEventListener('mousedown', onStart);
  el.addEventListener('mouseup', onCancel);
  el.addEventListener('mousemove', onCancel);
}

function startMenuDrag(id, type, name, iconType, srcEl, x, y) {
  // 고스트 생성
  const iconSvg = iconType === 'folder'
    ? `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
  const ghost = document.createElement('div');
  ghost.className = 'menu-drag-ghost';
  ghost.innerHTML = iconSvg + `<span>${name}</span>`;
  ghost.style.left = (x - 20) + 'px';
  ghost.style.top  = (y - 20) + 'px';
  document.body.appendChild(ghost);

  srcEl.classList.add('menu-dragging');
  menuDrag = { id, type, srcEl, ghost, x, y };

  document.addEventListener('touchmove', onMenuDragMove, { passive: false });
  document.addEventListener('touchend',  onMenuDragEnd);
  document.addEventListener('mousemove', onMenuDragMove);
  document.addEventListener('mouseup',   onMenuDragEnd);
}

function onMenuDragMove(e) {
  if (!menuDrag) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const x = touch.clientX, y = touch.clientY;
  menuDrag.ghost.style.left = (x - 20) + 'px';
  menuDrag.ghost.style.top  = (y - 20) + 'px';

  // 초기화
  document.querySelectorAll('.menu-drop-indicator.visible').forEach(el => {
    el.classList.remove('visible', 'indented');
  });
  document.querySelectorAll('.menu-drop-target').forEach(el => el.classList.remove('menu-drop-target'));

  if (menuDrag.type === 'group') {
    // 그룹 드래그: top 레벨 인디케이터만 (그룹 사이)
    const topInds = [...document.querySelectorAll('.menu-drop-indicator[data-level="top"]')];
    let closest = null, closestDist = Infinity;
    topInds.forEach(ind => {
      const r = ind.getBoundingClientRect();
      const dist = Math.abs(y - (r.top + r.height / 2));
      if (dist < closestDist) { closestDist = dist; closest = ind; }
    });
    if (closest) closest.classList.add('visible');

  } else {
    // 이야기 드래그: 그룹 행 3등분으로 판단
    const groupRows = [...document.querySelectorAll('.menu-group-row')];
    let handled = false;

    for (const gr of groupRows) {
      const r = gr.getBoundingClientRect();
      if (y < r.top || y > r.bottom) continue;

      const third = r.height / 3;
      const groupId = gr.dataset.id;
      const isExpanded = gr.dataset.expanded === 'true';

      if (y < r.top + third) {
        // 상단 1/3: 그룹 위 라인 인디케이터
        const ind = document.querySelector(`.menu-drop-indicator[data-level="top"][data-before="${groupId}"]`);
        if (ind) ind.classList.add('visible');
      } else if (y > r.bottom - third) {
        // 하단 1/3: 그룹 아래 라인 인디케이터
        const findMenuBottomInd = (groupRowEl) => {
          // 그룹 행 다음 형제(childWrap 건너뛰고) top 인디케이터 찾기
          let el = groupRowEl.nextElementSibling;
          while (el) {
            if (el.classList.contains('menu-drop-indicator') && el.dataset.level === 'top') return el;
            el = el.nextElementSibling;
          }
          return null;
        };
        if (isExpanded) {
          const childInds = [...document.querySelectorAll(`.menu-drop-indicator[data-level="child"][data-group="${groupId}"]`)];
          const hasChildren = childInds.length >= 2;
          if (hasChildren) {
            const last = childInds[childInds.length - 1];
            if (last) { last.classList.add('visible', 'indented'); }
          } else {
            const ind = findMenuBottomInd(gr);
            if (ind) ind.classList.add('visible');
          }
        } else {
          const ind = findMenuBottomInd(gr);
          if (ind) ind.classList.add('visible');
        }
      } else {
        // 중간 1/3: 그룹 테두리 인디케이터
        gr.classList.add('menu-drop-target');
      }
      handled = true;
      break;
    }

    if (!handled) {
      // 그룹 행 바깥: 가장 가까운 인디케이터
      // height:0 인디케이터는 위치 기반으로 찾기 어려우니 마지막 top 인디케이터를 별도 처리
      const allTopInds = [...document.querySelectorAll('.menu-drop-indicator[data-level="top"]')];
      const lastTopInd = allTopInds[allTopInds.length - 1];
      const allChildInds = [...document.querySelectorAll('.menu-drop-indicator[data-level="child"]')];
      const allInds = [...allTopInds, ...allChildInds];

      // 마지막 그룹 아래 영역인지 확인 (마지막 그룹행 bottom보다 아래)
      const lastGroupRow = groupRows[groupRows.length - 1];
      if (lastGroupRow) {
        const lastR = lastGroupRow.getBoundingClientRect();
        // 마지막 그룹 아래 공백 영역이면 맨 마지막 top 인디케이터 활성화
        if (y > lastR.bottom && lastTopInd) {
          lastTopInd.classList.add('visible');
          handled = true;
        }
      }

      if (!handled) {
        let closest = null, closestDist = Infinity;
        allInds.forEach(ind => {
          const r = ind.getBoundingClientRect();
          const dist = Math.abs(y - (r.top + r.height / 2));
          if (dist < closestDist) { closestDist = dist; closest = ind; }
        });
        if (closest) {
          const isChild = closest.dataset.level === 'child';
          closest.classList.add('visible');
          if (isChild) closest.classList.add('indented');
        }
      }
    }
  }
}

function onMenuDragEnd(e) {
  if (!menuDrag) return;

  const dropIndicator = document.querySelector('.menu-drop-indicator.visible');
  const dropTarget = document.querySelector('.menu-drop-target');

  if (dropIndicator) {
    dropToIndicator(dropIndicator);
  } else if (dropTarget && menuDrag.type === 'story') {
    // 접힌 그룹 위에 드롭 → 그룹 맨 끝에 추가
    const groupId = dropTarget.dataset.id;
    const { id } = menuDrag;
    let moved = null;
    MENU_DATA = MENU_DATA.filter(item => {
      if (item.type === 'story' && item.id === id) { moved = item; return false; }
      if (item.type === 'group') {
        const ci = item.children.findIndex(s => s.id === id);
        if (ci !== -1) { moved = item.children[ci]; item.children.splice(ci, 1); }
      }
      return true;
    });
    if (moved) {
      const group = MENU_DATA.find(i => i.id === groupId);
      if (group) group.children.push(moved);
    }
  }

  menuDrag.ghost.remove();
  menuDrag.srcEl.classList.remove('menu-dragging');
  document.querySelectorAll('.menu-drop-indicator.visible').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.menu-drop-target').forEach(el => el.classList.remove('menu-drop-target'));
  menuDrag = null;
  document.removeEventListener('touchmove', onMenuDragMove);
  document.removeEventListener('touchend',  onMenuDragEnd);
  document.removeEventListener('mousemove', onMenuDragMove);
  document.removeEventListener('mouseup',   onMenuDragEnd);

  renderMenuList();
}

function dropToIndicator(indicatorEl) {
  const { id, type } = menuDrag;
  const level = indicatorEl.dataset.level; // 'top' | 'child'
  const groupId = indicatorEl.dataset.group; // child일 때만
  const insertBeforeId = indicatorEl.dataset.before || null; // 삽입 위치

  // 원본에서 항목 추출
  let moved = null;
  if (type === 'group') {
    const idx = MENU_DATA.findIndex(i => i.id === id);
    if (idx !== -1) { [moved] = MENU_DATA.splice(idx, 1); }
  } else {
    // 최상위 이야기
    const ti = MENU_DATA.findIndex(i => i.type === 'story' && i.id === id);
    if (ti !== -1) { [moved] = MENU_DATA.splice(ti, 1); }
    else {
      // 그룹 안 이야기
      for (const item of MENU_DATA) {
        if (item.type !== 'group') continue;
        const ci = item.children.findIndex(s => s.id === id);
        if (ci !== -1) { [moved] = item.children.splice(ci, 1); break; }
      }
    }
  }
  if (!moved) return;

  if (level === 'child') {
    // 그룹 안 삽입 (펼쳐진 그룹 or 접힌 그룹 모두 처리)
    const group = MENU_DATA.find(i => i.id === groupId);
    if (!group) { MENU_DATA.push(moved); return; }
    if (insertBeforeId) {
      const idx = group.children.findIndex(s => s.id === insertBeforeId);
      group.children.splice(Math.max(0, idx), 0, moved);
    } else {
      group.children.push(moved);
    }
  } else {
    // 최상위 삽입
    if (insertBeforeId) {
      const idx = MENU_DATA.findIndex(i => i.id === insertBeforeId);
      MENU_DATA.splice(Math.max(0, idx), 0, moved);
    } else {
      MENU_DATA.push(moved);
    }
  }
  saveMenuData();
}

function selectStory(id) {

  MENU_DATA.forEach(item => {
    if (item.type === 'story') item.active = false;

    let committed = false;

      if (committed) return;

      let target = null;

function toggleSingleSelect(btn) {
  const wrap  = btn.closest('.single-select-wrap');
  const popup = wrap.querySelector('.multi-select-popup');
  const isOpen = popup.classList.contains('open');
  document.querySelectorAll('.multi-select-popup.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.multi-select-btn.open').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    // 팝업이 비어있으면 즉시 채우기
    if (popup.children.length === 0) {
      const isEra = wrap.classList.contains('era-select-wrap');
      const isSeason = wrap.classList.contains('season-select-wrap');
      const currentVal = btn.querySelector('.multi-select-btn-text')?.textContent?.trim();
      if (isEra) {
        const eras = getEras().map(e => e.name);
        const eraOptions = [{ id:'연호없음', name:'연호없음' }, ...eras.map(n=>({ id:n, name:n }))];
        buildSingleSelectPopup(wrap, eraOptions, currentVal || '연호없음');
      } else if (isSeason) {
        const seasons = ['-','봄','여름','가을','겨울','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
        buildSingleSelectPopup(wrap, seasons.map(s=>({ id:s, name:s })), currentVal || '-');
      }
    }
    popup.classList.add('open');
    btn.classList.add('open');
  }
}

function buildSingleSelectPopup(wrap, options, currentVal) {
  const popup = wrap.querySelector('.multi-select-popup');
  const btn   = wrap.querySelector('.multi-select-btn');
  popup.innerHTML = '';
  options.forEach(({ id, name }) => {
    const item = document.createElement('div');
    item.className = 'multi-select-item' + (name === currentVal ? ' selected' : '');
    item.dataset.id = id;
    item.innerHTML = `<span>${name}</span><svg class="multi-select-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    item.onclick = () => {
      setSingleSelectValue(wrap, name);
      popup.classList.remove('open');
      btn.classList.remove('open');
    };
    popup.appendChild(item);
  });
  // 현재 값 버튼에 표시
  const textEl = btn.querySelector('.multi-select-btn-text');
  textEl.textContent = currentVal;
  const isDefault = (currentVal === '연호없음' || currentVal === '-');
  textEl.classList.toggle('placeholder', isDefault);
}

function setSingleSelectValue(wrap, value) {
  const popup = wrap?.querySelector('.multi-select-popup');
  const textEl = wrap?.querySelector('.multi-select-btn-text');
  if (!popup || !textEl) return;
  popup.querySelectorAll('.multi-select-item').forEach(item => {
    item.classList.toggle('selected', item.querySelector('span')?.textContent === value);
  });
  textEl.textContent = value;
  const isDefault = (value === '연호없음' || value === '-');
  textEl.classList.toggle('placeholder', isDefault);
}

let dragSrc=null, indicator=null;
function initDrag(card) {
  const h=card.querySelector('.drag-handle'); if(!h) return;
  h.addEventListener('mousedown', e=>startDrag(e,card));
  h.addEventListener('touchstart', e=>startDrag(e,card), {passive:false});
}
function startDrag(e,card) {
  e.preventDefault(); dragSrc=card; card.classList.add('dragging');
  indicator=document.createElement('div'); indicator.className='drag-indicator';
  document.addEventListener('mousemove',onDragMove); document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('mouseup',onDragEnd); document.addEventListener('touchend',onDragEnd);
}
function onDragMove(e) {
  if(!dragSrc) return; e.preventDefault();
  const y=e.touches?e.touches[0].clientY:e.clientY;
  const con=document.getElementById('blockContainer'); const btn=document.getElementById('addBlockBtn');
  const blocks=[...con.querySelectorAll('.block-card:not(.dragging)')];
  if(indicator.parentNode) indicator.remove();
  let ins=false;
  for(const b of blocks){const r=b.getBoundingClientRect();if(y<r.top+r.height/2){indicator.classList.add('visible');con.insertBefore(indicator,b);ins=true;break;}}
  if(!ins){indicator.classList.add('visible');con.insertBefore(indicator,btn);}
}
function onDragEnd() {
  if(!dragSrc) return; dragSrc.classList.remove('dragging');
  if(indicator&&indicator.parentNode){
    const btn=document.getElementById('addBlockBtn'); const con=document.getElementById('blockContainer');
    if(indicator.nextSibling===btn||!indicator.nextSibling) con.insertBefore(dragSrc,btn);
    else indicator.parentNode.insertBefore(dragSrc,indicator);
    indicator.remove();
  }
  dragSrc=null; indicator=null;
  document.removeEventListener('mousemove',onDragMove); document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd); document.removeEventListener('touchend',onDragEnd);
}

// ── 헬퍼: period 블록에서 시점 텍스트 추출 ──
function getPeriodText(item) {
  if (!item.blocks?.blocks) return null;
  const pb = item.blocks.blocks.find(b => b.type === 'period');
  if (!pb) return null;
  const parts = [];
  if (pb.era && pb.era !== '연호없음') parts.push(pb.era);
  if (pb.year) parts.push(pb.year + '년');
  if (pb.season && pb.season !== '-') parts.push(pb.season);
  return parts.length ? parts.join(' ') : null;
}

// period 블록의 정렬 키 (연도 숫자 기준)
function getPeriodSortKey(item) {
  if (!item.blocks?.blocks) return 99999;
  const pb = item.blocks.blocks.find(b => b.type === 'period');
  if (!pb) return 99999;
  return parseInt(pb.year) || 99999;
}

// related-person 블록에서 인물 id 목록 추출
function getRelatedPersonIds(item) {
  if (!item.blocks?.blocks) return [];
  return item.blocks.blocks
    .filter(b => b.type === 'related-person')
    .flatMap(b => b.values?.length ? b.values : (b.value ? [b.value] : []));
}

// ── 렌더 ──
function renderTimelinePage() {
  if (!PROJECT_ID) return;

  const events  = ITEMS.filter(i => i.type === '사건');
  const persons = ITEMS.filter(i => i.type === '인물');

  // 필터 선택 인물 없으면 → 전체 열 (사건 전체 표시)
  const isAllMode = persons.length === 0 || tlFilterPersonIds.length === 0;
  const displayPersons = isAllMode
    ? (persons.length > 0 ? persons : [{ id: '__dummy__', name: '-', type: '인물' }])
    : persons.filter(p => tlFilterPersonIds.includes(p.id));

  // 인물별 사건 매핑
  const personEventMap = {};
  displayPersons.forEach(p => { personEventMap[p.id] = []; });

  if (isAllMode && persons.length === 0) {
    // 더미: 사건 없음
  } else if (isAllMode) {
    // 전체 모드: 모든 사건을 표시 (인물 구분 없이 각 열에 동일하게)
    // 실제로는 인물별로 태그된 사건만 각 열에 표시
    events.forEach(ev => {
      const relIds = getRelatedPersonIds(ev);
      displayPersons.forEach(p => {
        if (relIds.includes(p.id)) personEventMap[p.id].push(ev);
      });
    });
  } else {
    events.forEach(ev => {
      const relIds = getRelatedPersonIds(ev);
      displayPersons.forEach(p => {
        if (relIds.includes(p.id)) personEventMap[p.id].push(ev);
      });
    });
  }

  // 전체 모드: 인물 미선택 시 단일 "전체" 열에 모든 사건 표시
  let allEventsCol = null;
  if (isAllMode && persons.length > 0) {
    // 인물별 열 대신 "전체" 열 하나로 표시
    allEventsCol = sortTlEvents(events);
  }

  // 시점 목록 수집 (연호 필터 적용)
  const srcEvents = (allEventsCol || Object.values(personEventMap).flat());
  const periodMap = {};
  srcEvents.forEach(ev => {
    const text = getPeriodText(ev);
    if (!text) return;
    const pb  = ev.blocks?.blocks?.find(b => b.type === 'period');
    const era = pb?.era || '';
    if (tlEraFilter === '__none__' && era && era !== '연호없음') return;
    if (tlEraFilter !== '__all__' && tlEraFilter !== '__none__' && era !== tlEraFilter) return;
    if (!periodMap[text]) periodMap[text] = { text, sortKey: getPeriodSortKey(ev) };
  });
  const periods = Object.values(periodMap).sort((a, b) => a.sortKey - b.sortKey);

  const table = document.getElementById('tlTable');
  table.innerHTML = '';

  // 시점 없는 사건이 하나라도 있으면 맨 위에 빈 시점행 추가 (연호 필터 적용)
  const hasNoTimeSrc = (allEventsCol || Object.values(personEventMap).flat())
    .some(ev => {
      if (getPeriodText(ev)) return false;
      const pb  = ev.blocks?.blocks?.find(b => b.type === 'period');
      const era = pb?.era || '';
      if (tlEraFilter === '__none__' && era && era !== '연호없음') return false;
      if (tlEraFilter !== '__all__' && tlEraFilter !== '__none__' && era !== tlEraFilter) return false;
      return true;
    });

  // ── 시점 열 ──
  const timeCol = document.createElement('div');
  timeCol.className = 'tl-time-col';
  timeCol.appendChild(Object.assign(document.createElement('div'), { className: 'tl-time-hdr' }));
  // 연호 버튼
  const timeHdrEl = timeCol.querySelector('.tl-time-hdr');
  const eraLabel = tlEraFilter === '__all__' ? '전체' : tlEraFilter === '__none__' ? '없음' : '연호';
  timeHdrEl.innerHTML = `<button class="tl-era-btn" id="tlEraBtn" onclick="openTlEraPopup(event)">
    <span class="tl-era-btn-text">${eraLabel}</span>
    <div class="tl-era-btn-line"></div>
  </button>`;
  // 시점 없는 사건 행: 빈 셀
  if (hasNoTimeSrc) {
    timeCol.appendChild(Object.assign(document.createElement('div'), { className: 'tl-time-cell' }));
  }
  periods.forEach(period => {
    timeCol.appendChild(Object.assign(document.createElement('div'), {
      className: 'tl-time-cell', textContent: period.text
    }));
  });
  table.appendChild(timeCol);

  // ── 사건 열들 ──
  const cols = allEventsCol
    ? [{ name: '전체', id: '__all__', evs: allEventsCol }]
    : displayPersons.map(p => ({ name: p.name || '-', id: p.id, evs: sortTlEvents(personEventMap[p.id] || []) }));

  cols.forEach(({ name, id, evs }) => {
    const col = document.createElement('div');
    col.className = 'tl-char-col';

    // 인물명 헤더 셀 (sticky top)
    const hdr = document.createElement('div');
    hdr.className = 'tl-char-hdr';
    hdr.innerHTML = `<div class="tl-char-hdr-inner"><span>${name}</span><div class="tl-char-hdr-line"></div></div>`;
    col.appendChild(hdr);

    // 시점 없는 사건 행 (맨 위, 드래그 이동 가능)
    if (hasNoTimeSrc) {
      const cell = document.createElement('div');
      cell.className = 'tl-char-cell';
      cell.dataset.notime = '1';
      const noTimeEvs = evs.filter(ev => {
        if (getPeriodText(ev)) return false;
        const pb  = ev.blocks?.blocks?.find(b => b.type === 'period');
        const era = pb?.era || '';
        if (tlEraFilter === '__none__' && era && era !== '연호없음') return false;
        if (tlEraFilter !== '__all__' && tlEraFilter !== '__none__' && era !== tlEraFilter) return false;
        return true;
      });
      // 인디케이터 + 카드 교대로 삽입
      cell.appendChild(makeTlDropIndicator());
      noTimeEvs.forEach(ev => {
        const card = makeTlEventCard(ev);
        attachTlCardLongPress(card, ev.id, cell);
        cell.appendChild(card);
        cell.appendChild(makeTlDropIndicator());
      });
      col.appendChild(cell);
    }

    // 시점 있는 사건 행
    periods.forEach(period => {
      const cell = document.createElement('div');
      cell.className = 'tl-char-cell';
      evs.filter(ev => {
        if (getPeriodText(ev) !== period.text) return false;
        const pb  = ev.blocks?.blocks?.find(b => b.type === 'period');
        const era = pb?.era || '';
        if (tlEraFilter === '__none__' && era && era !== '연호없음') return false;
        if (tlEraFilter !== '__all__' && tlEraFilter !== '__none__' && era !== tlEraFilter) return false;
        return true;
      }).forEach(ev => cell.appendChild(makeTlEventCard(ev)));
      col.appendChild(cell);
    });

    // + 사건 추가
    const addCell = document.createElement('div');
    addCell.className = 'tl-add-cell';
    const btn = document.createElement('button');
    btn.className = 'tl-add-event-btn';
    btn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>사건 추가`;
    btn.onclick = () => addTlEvent(id === '__all__' || id === '__dummy__' ? null : id);
    addCell.appendChild(btn);
    col.appendChild(addCell);

    table.appendChild(col);
  });

  // 헤더 행 높이 동기화
  requestAnimationFrame(() => {
    const timeHdr  = timeCol.querySelector('.tl-time-hdr');
    const charHdrs = table.querySelectorAll('.tl-char-hdr');
    if (timeHdr && charHdrs.length) {
      let maxH = timeHdr.scrollHeight;
      charHdrs.forEach(h => { maxH = Math.max(maxH, h.scrollHeight); });
      timeHdr.style.height = maxH + 'px';
      charHdrs.forEach(h => { h.style.height = maxH + 'px'; });
    }

    // 사건 행 높이 동기화
    const timeCells = timeCol.querySelectorAll('.tl-time-cell');
    const charCols  = table.querySelectorAll('.tl-char-col');
    timeCells.forEach((tc, i) => {
      let maxH = tc.scrollHeight;
      charCols.forEach(col => {
        const cells = col.querySelectorAll('.tl-char-cell');
        if (cells[i]) maxH = Math.max(maxH, cells[i].scrollHeight);
      });
      tc.style.height = maxH + 'px';
      charCols.forEach(col => {
        const cells = col.querySelectorAll('.tl-char-cell');
        if (cells[i]) cells[i].style.height = maxH + 'px';
      });
    });
  });
}

// 사건 정렬: 시점없음(수정순) → 시점있음(시점순)
function sortTlEvents(evs) {
  const noTime  = evs.filter(ev => !getPeriodText(ev))
                     .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  const hasTime = evs.filter(ev => getPeriodText(ev))
                     .sort((a, b) => getPeriodSortKey(a) - getPeriodSortKey(b));
  return [...noTime, ...hasTime];
}

let tlFilterPersonIds = [];

function openTlEraPopup(e) {
  e.stopPropagation();

function selectTlEra(era) {

  closeTlEraPopup();

function makeTlEventCard(ev) {
  const card = document.createElement('div');
  card.className = 'tl-event-card';
  card.dataset.itemId = ev.id;
  const isEmpty = !ev.name;
  card.innerHTML = `
    <div class="tl-event-card-name${isEmpty ? ' empty' : ''}">${isEmpty ? '새 사건' : ev.name}</div>
    ${ev.desc ? `<div class="tl-event-card-desc">${ev.desc}</div>` : ''}
  `;
  card.onclick = () => openDetail(ev);
  return card;
}

function addTlEvent(personId) {
  const newItem = { id: 'event-' + Date.now(), type: '사건', name: '', desc: '',
    blocks: { blocks: [] } };
  if (personId) newItem.blocks.blocks.push({ type: 'related-person', value: personId });
  ITEMS.push(newItem);
  STORY_DB[PROJECT_ID] = ITEMS;
  const q = document.querySelector('.search-input-box input');
  if (q) onSearch(q.value);
  renderTimelinePage();
  openDetail(newItem);
}

function makeTlDropIndicator() {
  const el = document.createElement('div');
  el.className = 'tl-drop-indicator';
  return el;
}

// ── 타임라인 카드 드래그드롭 ──
let tlCardDrag = null;

function attachTlCardLongPress(card, itemId, cell) {
  let timer = null;
  const onStart = e => {
    if (e.target.closest('button')) return;
    const touch = e.touches ? e.touches[0] : e;
    timer = setTimeout(() => {
      e.preventDefault && e.preventDefault();
      startTlCardDrag(itemId, card, touch.clientX, touch.clientY);
    }, 500);
  };
  const onCancel = () => { clearTimeout(timer); timer = null; };
  card.addEventListener('touchstart', onStart, { passive: true });
  card.addEventListener('touchend', onCancel);
  card.addEventListener('touchmove', onCancel, { passive: true });
  card.addEventListener('mousedown', onStart);
  card.addEventListener('mouseup', onCancel);
  card.addEventListener('mousemove', onCancel);
}

function startTlCardDrag(itemId, srcCard, x, y) {
  const item = ITEMS.find(i => i.id === itemId);
  const ghost = document.createElement('div');
  ghost.className = 'tl-drag-ghost';
  ghost.textContent = item?.name || '새 사건';
  ghost.style.left = (x - 20) + 'px';
  ghost.style.top  = (y - 20) + 'px';
  document.body.appendChild(ghost);
  srcCard.classList.add('tl-dragging');
  tlCardDrag = { itemId, srcCard, ghost };
  document.addEventListener('touchmove', onTlCardDragMove, { passive: false });
  document.addEventListener('touchend',  onTlCardDragEnd);
  document.addEventListener('mousemove', onTlCardDragMove);
  document.addEventListener('mouseup',   onTlCardDragEnd);
}

function onTlCardDragMove(e) {
  if (!tlCardDrag) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const x = touch.clientX, y = touch.clientY;
  tlCardDrag.ghost.style.left = (x - 20) + 'px';
  tlCardDrag.ghost.style.top  = (y - 20) + 'px';

  // 인디케이터 초기화
  document.querySelectorAll('.tl-drop-indicator.visible').forEach(el => el.classList.remove('visible'));

  // 시점 없는 셀 내 인디케이터에서 가장 가까운 것 찾기
  const inds = [...document.querySelectorAll('[data-notime="1"] .tl-drop-indicator')];
  let closest = null, dist = Infinity;
  inds.forEach(ind => {
    const r = ind.getBoundingClientRect();
    const d = Math.abs(y - (r.top + r.height / 2));
    if (d < dist) { dist = d; closest = ind; }
  });
  if (closest) closest.classList.add('visible');
}

function onTlCardDragEnd() {
  if (!tlCardDrag) return;
  const visibleInd = document.querySelector('[data-notime="1"] .tl-drop-indicator.visible');

  if (visibleInd) {
    // 인디케이터 위치 기준으로 순서 재배치
    const cell = visibleInd.closest('[data-notime="1"]');
    if (cell) {
      // 셀 안의 카드들 현재 순서 파악 (인디케이터 제외)
      const cards = [...cell.querySelectorAll('.tl-event-card')];
      const indEls = [...cell.querySelectorAll('.tl-drop-indicator')];
      const dropIdx = indEls.indexOf(visibleInd); // 0~n

      // 현재 notime 사건 id 순서
      const noTimeIds = cards.map(c => c.dataset?.itemId).filter(Boolean);

      // 드래그 카드 ID
      const dragId = tlCardDrag.itemId;
      const fromIdx = noTimeIds.indexOf(dragId);
      if (fromIdx !== -1) {
        noTimeIds.splice(fromIdx, 1);
        const insertIdx = Math.max(0, dropIdx > fromIdx ? dropIdx - 1 : dropIdx);
        noTimeIds.splice(insertIdx, 0, dragId);

        // ITEMS 배열에서 notime 사건들 순서 재배치
        const noTimeItems = noTimeIds.map(id => ITEMS.find(i => i.id === id)).filter(Boolean);
        const otherItems  = ITEMS.filter(i => !noTimeIds.includes(i.id));
        // notime 사건들의 원래 인덱스 중 첫 번째 위치에 삽입
        const firstIdx = Math.min(...noTimeIds.map(id => ITEMS.findIndex(i => i.id === id)).filter(n => n >= 0));
        ITEMS = otherItems;
        ITEMS.splice(firstIdx < 0 ? ITEMS.length : firstIdx, 0, ...noTimeItems);
        STORY_DB[PROJECT_ID] = ITEMS;
      }
    }
  }

  tlCardDrag.ghost.remove();
  tlCardDrag.srcCard.classList.remove('tl-dragging');
  document.querySelectorAll('.tl-drop-indicator.visible').forEach(el => el.classList.remove('visible'));
  tlCardDrag = null;
  document.removeEventListener('touchmove', onTlCardDragMove);
  document.removeEventListener('touchend',  onTlCardDragEnd);
  document.removeEventListener('mousemove', onTlCardDragMove);
  document.removeEventListener('mouseup',   onTlCardDragEnd);
  renderTimelinePage();
}

// 필터 팝업
function openTlFilterPopup(e) {
  e.stopPropagation();
  const popup = document.getElementById('tlPersonSearchPopup');
  const btn   = document.getElementById('tlFilterBtn');
  if (popup.classList.contains('open')) {
    closeTlFilterPopup(); return;
  }
  const rect = btn.getBoundingClientRect();
  popup.style.top  = (rect.bottom + 4) + 'px';
  popup.style.right = (window.innerWidth - rect.right) + 'px';
  popup.style.left = 'auto';
  popup.classList.add('open');
  const input = document.getElementById('tlPersonSearchInput');
  input.value = '';
  renderTlPersonSearchList('');
  requestAnimationFrame(() => input.focus());
}
function closeTlFilterPopup() {
  document.getElementById('tlPersonSearchPopup').classList.remove('open');
}
function renderTlPersonSearchList(query) {
  const list    = document.getElementById('tlPersonSearchList');
  const persons = ITEMS.filter(i => i.type === '인물');
  const q       = query.trim().toLowerCase();
  const filtered = q ? persons.filter(p => (p.name||'').toLowerCase().includes(q)) : persons;
  list.innerHTML = '';
  if (filtered.length === 0) {
    list.innerHTML = `<div class="tl-person-search-empty">인물이 없습니다</div>`;
    return;
  }
  filtered.forEach(p => {
    const item = document.createElement('div');
    const isSelected = tlFilterPersonIds.includes(p.id);
    item.className = 'tl-person-search-item' + (isSelected ? ' selected' : '');
    item.innerHTML = `<span>${p.name || '-'}</span>
      <svg class="tl-person-search-item-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    item.onclick = () => toggleTlFilterPerson(p.id);
    list.appendChild(item);
  });
}
function toggleTlFilterPerson(personId) {
  const idx = tlFilterPersonIds.indexOf(personId);
  if (idx === -1) tlFilterPersonIds.push(personId);
  else tlFilterPersonIds.splice(idx, 1);
  // 필터 버튼 활성 표시
  document.getElementById('tlFilterBtn').classList.toggle('active', tlFilterPersonIds.length > 0);
  renderTlPersonSearchList(document.getElementById('tlPersonSearchInput').value);
  renderTimelinePage();
}
function clearTlFilter() {
  tlFilterPersonIds = [];
  document.getElementById('tlFilterBtn').classList.remove('active');
  renderTlPersonSearchList(document.getElementById('tlPersonSearchInput').value);
  renderTimelinePage();
  closeTlFilterPopup();
}
// 팝업 외부 탭 닫기
document.addEventListener('click', e => {
  const p = document.getElementById('tlPersonSearchPopup');
  if (p && p.classList.contains('open') && !p.contains(e.target)) closeTlFilterPopup();
});

};
const SETTING_ETC_EXPANDED = {};

function getSettingGroups() {
  if (!PROJECT_ID) return [];
  if (!SETTING_GROUPS[PROJECT_ID]) SETTING_GROUPS[PROJECT_ID] = [];
  return SETTING_GROUPS[PROJECT_ID];
}
function getSettingEtcExpanded() {
  if (SETTING_ETC_EXPANDED[PROJECT_ID] === undefined) SETTING_ETC_EXPANDED[PROJECT_ID] = true;
  return SETTING_ETC_EXPANDED[PROJECT_ID];
}
function setSettingEtcExpanded(v) { SETTING_ETC_EXPANDED[PROJECT_ID] = v; }

// 설정 타입 ITEMS에서 가져오기
function getSettingItems() {
  return ITEMS.filter(i => i.type === '설정');
}
// 그룹에 속하지 않은 카드 (기타)
function getSettingEtcItems() {
  const groups = getSettingGroups();
  const usedIds = new Set(groups.flatMap(g => g.cardIds));
  return getSettingItems().filter(i => !usedIds.has(i.id));
}

function onSettingImageWrapClick() {

    openImageViewer([img.src], 0);
  } else {
    triggerSettingImagePick();

function triggerSettingImagePick() {

}
async function onSettingImageSelected(input) {
  const file = input.files[0]; if (!file || !PROJECT_ID) return;
  input.value = '';
  // 로컬 미리보기 먼저
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('settingImageEl');
    img.src = e.target.result; img.style.display = 'block';
    document.getElementById('settingImagePlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
  // 기존 이미지 삭제 후 Storage 업로드
  try {

function renderSettingList() {
  const body = document.getElementById('settingListBody');
  body.innerHTML = '';
  const groups = getSettingGroups();
  const allItems = getSettingItems();

  // 상단 top-group 인디케이터
  body.appendChild(makeSettingDropIndicator('top-group', null, null));

  groups.forEach((group, idx) => {
    const prevInd = body.lastElementChild;
    if (prevInd && prevInd.classList.contains('setting-drop-indicator')) {
      prevInd.dataset.beforeGroup = group.id;
    }

    const header = makeSettingGroupHeader(group, false);
    header.dataset.groupId = group.id;
    if (idx === 0) header.style.marginTop = '0';
    attachSettingLongPress(header, group.id, 'group', group.name);
    body.appendChild(header);

    if (group.expanded) {
      const groupItems = group.cardIds.map(id => allItems.find(i => i.id === id)).filter(Boolean);
      body.appendChild(makeSettingDropIndicator('child', group.id, null));
      groupItems.forEach(item => {
        const card = makeSettingCard(item);
        card.dataset.itemId = item.id;
        card.dataset.groupId = group.id;
        attachSettingLongPress(card, item.id, 'card', item.name || '새 설정');
        body.appendChild(card);
        body.appendChild(makeSettingDropIndicator('child', group.id, item.id));
      });
    }

    const nextGroupId = groups[idx + 1]?.id || null;
    const bottomInd = makeSettingDropIndicator('top-group', null, null);
    if (nextGroupId) bottomInd.dataset.beforeGroup = nextGroupId;
    body.appendChild(bottomInd);
  });

  // 기타 (미분류) - 항상 표시
  const etcExpanded = getSettingEtcExpanded();
  const etcItems = getSettingEtcItems();
  const etcHeader = makeSettingGroupHeader({ id: '__etc__', name: '기타', expanded: etcExpanded }, true);
  etcHeader.dataset.groupId = '__etc__';
  if (groups.length === 0) etcHeader.style.marginTop = '0';
  body.appendChild(etcHeader);
  if (etcExpanded) {
    body.appendChild(makeSettingDropIndicator('etc', null, null));
    etcItems.forEach(item => {
      const card = makeSettingCard(item);
      card.dataset.itemId = item.id;
      attachSettingLongPress(card, item.id, 'card', item.name || '새 설정');
      body.appendChild(card);
      body.appendChild(makeSettingDropIndicator('etc', null, item.id));
    });
  }

  // + 그룹 추가
  const addBtn = document.createElement('button');
  addBtn.style.cssText = 'display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--text-secondary);font-family:inherit;font-size:14px;padding:12px 0;width:100%;';
  addBtn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>그룹 추가`;
  addBtn.onclick = addSettingGroup;
  body.appendChild(addBtn);
}

// ── 드래그드롭 ──
let settingDrag = null;

function attachSettingLongPress(el, id, type, name) {
  let timer = null;
  const onStart = e => {
    if (e.target.closest('button')) return;
    const touch = e.touches ? e.touches[0] : e;
    timer = setTimeout(() => {
      e.preventDefault();
      startSettingDrag(id, type, name, el, touch.clientX, touch.clientY);
    }, 500);
  };
  const onCancel = () => { clearTimeout(timer); timer = null; };
  el.addEventListener('touchstart', onStart, { passive: true });
  el.addEventListener('touchend', onCancel);
  el.addEventListener('touchmove', onCancel, { passive: true });
  el.addEventListener('mousedown', onStart);
  el.addEventListener('mouseup', onCancel);
  el.addEventListener('mousemove', onCancel);
}

function startSettingDrag(id, type, name, srcEl, x, y) {
  const ghost = document.createElement('div');
  ghost.className = 'setting-drag-ghost';
  const icon = type === 'group'
    ? `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`
    : `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  ghost.innerHTML = icon + `<span>${name}</span>`;
  ghost.style.cssText = `left:${x - 20}px;top:${y - 20}px;`;
  document.body.appendChild(ghost);
  srcEl.style.opacity = '0.4';
  settingDrag = { id, type, srcEl, ghost };
  document.addEventListener('touchmove', onSettingDragMove, { passive: false });
  document.addEventListener('touchend', onSettingDragEnd);
  document.addEventListener('mousemove', onSettingDragMove);
  document.addEventListener('mouseup', onSettingDragEnd);
}

function onSettingDragMove(e) {
  if (!settingDrag) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const x = touch.clientX, y = touch.clientY;
  settingDrag.ghost.style.left = (x - 20) + 'px';
  settingDrag.ghost.style.top  = (y - 20) + 'px';

  document.querySelectorAll('.setting-drop-indicator.visible').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.setting-group-drop-target').forEach(el => el.classList.remove('setting-group-drop-target'));

  const body = document.getElementById('settingListBody');

  if (settingDrag.type === 'group') {
    // top-group 인디케이터만
    const inds = [...body.querySelectorAll('.setting-drop-indicator[data-level="top-group"]')];
    let closest = null, dist = Infinity;
    inds.forEach(ind => {
      const r = ind.getBoundingClientRect();
      const d = Math.abs(y - (r.top + r.height / 2));
      if (d < dist) { dist = d; closest = ind; }
    });
    if (closest) closest.classList.add('visible');
  } else {
    // 그룹 헤더 3등분 판정
    const headers = [...body.querySelectorAll('.setting-group-header')];
    let handled = false;
    for (const header of headers) {
      const r = header.getBoundingClientRect();
      if (y < r.top || y > r.bottom) continue;
      handled = true;
      const zone = (y - r.top) / r.height;
      const gid = header.dataset.groupId;

      if (zone < 1/3) {
        // 상단: 그룹 위 top-group 인디케이터
        let el = header.previousElementSibling;
        while (el) {
          if (el.classList.contains('setting-drop-indicator') && el.dataset.level === 'top-group') {
            el.classList.add('visible'); break;
          }
          el = el.previousElementSibling;
        }
      } else if (zone < 2/3) {
        // 중간: 그룹 테두리
        header.classList.add('setting-group-drop-target');
      } else {
        // 하단: 그룹 내 마지막 child 인디케이터 or 그룹 아래 top-group
        const group = getSettingGroups().find(g => g.id === gid);
        if (group && group.expanded && group.cardIds.length > 0) {
          let el = header.nextElementSibling;
          while (el) {
            if (el.classList.contains('setting-drop-indicator') && el.dataset.level === 'child' && !el.dataset.after) {
              // 마지막 child(after없는 것)를 찾아 visible
            }
            if (el.classList.contains('setting-drop-indicator') && el.dataset.level === 'top-group') break;
            el = el.nextElementSibling;
          }
          // 마지막 child 인디케이터 (after 있는 것 중 마지막)
          let lastChildInd = null;
          let cur = header.nextElementSibling;
          while (cur && !(cur.classList.contains('setting-drop-indicator') && cur.dataset.level === 'top-group')) {
            if (cur.classList.contains('setting-drop-indicator') && cur.dataset.level === 'child') lastChildInd = cur;
            cur = cur.nextElementSibling;
          }
          if (lastChildInd) { lastChildInd.classList.add('visible'); lastChildInd.classList.add('indented'); }
        } else {
          let el = header.nextElementSibling;
          while (el) {
            if (el.classList.contains('setting-drop-indicator') && el.dataset.level === 'top-group') {
              el.classList.add('visible'); break;
            }
            el = el.nextElementSibling;
          }
        }
      }
      break;
    }

    if (!handled) {
      const inds = [...body.querySelectorAll('.setting-drop-indicator[data-level="child"], .setting-drop-indicator[data-level="etc"]')];
      let closest = null, dist = Infinity;
      inds.forEach(ind => {
        const r = ind.getBoundingClientRect();
        const d = Math.abs(y - (r.top + r.height / 2));
        if (d < dist) { dist = d; closest = ind; }
      });
      if (closest) closest.classList.add('visible');
    }
  }
}

function onSettingDragEnd() {
  if (!settingDrag) return;
  const visibleInd = document.querySelector('.setting-drop-indicator.visible');
  const dropTarget = document.querySelector('.setting-group-drop-target');

  if (settingDrag.type === 'group') {
    if (visibleInd && visibleInd.dataset.level === 'top-group') {
      settingMoveGroup(settingDrag.id, visibleInd.dataset.beforeGroup || null);
    }
  } else {
    if (visibleInd) {
      const level = visibleInd.dataset.level;
      const toGroupId = (level === 'child') ? (visibleInd.dataset.group || null) : (level === 'etc' ? '__etc__' : null);
      const afterId = visibleInd.dataset.after || null;
      settingMoveCard(settingDrag.id, toGroupId, afterId);
    } else if (dropTarget) {
      settingMoveCard(settingDrag.id, dropTarget.dataset.groupId, null);
    }
  }

  settingDrag.ghost.remove();
  settingDrag.srcEl.style.opacity = '';
  document.querySelectorAll('.setting-drop-indicator.visible').forEach(el => { el.classList.remove('visible'); el.classList.remove('indented'); });
  document.querySelectorAll('.setting-group-drop-target').forEach(el => el.classList.remove('setting-group-drop-target'));
  settingDrag = null;
  document.removeEventListener('touchmove', onSettingDragMove);
  document.removeEventListener('touchend', onSettingDragEnd);
  document.removeEventListener('mousemove', onSettingDragMove);
  document.removeEventListener('mouseup', onSettingDragEnd);
  renderSettingList();
  saveSettingGroups();
  saveItemsOrder();
}

function settingMoveGroup(id, beforeGroupId) {
  const groups = getSettingGroups();
  const idx = groups.findIndex(g => g.id === id);
  if (idx === -1) return;
  const [moved] = groups.splice(idx, 1);
  if (beforeGroupId) {
    const ti = groups.findIndex(g => g.id === beforeGroupId);
    if (ti !== -1) { groups.splice(ti, 0, moved); return; }
  }
  groups.push(moved);
}

function settingMoveCard(cardId, toGroupId, afterId) {
  const groups = getSettingGroups();
  // 기존 그룹에서 제거
  groups.forEach(g => { g.cardIds = g.cardIds.filter(cid => cid !== cardId); });

  if (!toGroupId || toGroupId === '__etc__') return; // 기타로 이동

  const group = groups.find(g => g.id === toGroupId);
  if (!group) return;
  if (afterId) {
    const ti = group.cardIds.indexOf(afterId);
    group.cardIds.splice(ti + 1, 0, cardId);
  } else {
    group.cardIds.push(cardId);
  }
}

// ── renderList 후크: 설정 복원 시 renderSettingList 호출 ──
const _origRenderList = renderList;
renderList = function(items) {
  _origRenderList(items);
  if (currentTab === 'setting') renderSettingList();
};

// ════════════════════════════════════════
//  지도 뷰
// ════════════════════════════════════════

// 이야기별 지도 배경 이미지
const MAP_BG = {}; // { storyId: dataURL }

// 캔버스 크기: 화면 세로×2 기준 2:1 비율
function getMapSize() {
  const body = document.getElementById('settingMapBody');
  const bh = body ? body.clientHeight : window.innerHeight;
  return { w: bh * 2, h: bh };
}
let MAP_W = 780;
let MAP_H = 390;

// 지도 transform
let mapTransform = { scale: 1, tx: 0, ty: 0 };
let mapGestureInit = false;

function getMapRegions() {
  if (!PROJECT_ID) return [];
  return (STORY_DB[PROJECT_ID] || []).filter(i => i.type === '지역');
}

function applyMapTransform() {
  const world = document.getElementById('mapWorld');
  const body  = document.getElementById('settingMapBody');
  if (!world || !body) return;

  // scale 50~200% 제한
  mapTransform.scale = Math.min(2, Math.max(1, mapTransform.scale));

  // 패닝 제한: 상하좌우 모두 캔버스 끝이 화면 밖으로 안 나가게
  const bw = body.clientWidth;
  const bh = body.clientHeight;
  const iw = MAP_W * mapTransform.scale;
  const ih = MAP_H * mapTransform.scale;
  mapTransform.tx = Math.min(0, Math.max(bw - iw, mapTransform.tx));
  mapTransform.ty = Math.min(0, Math.max(bh - ih, mapTransform.ty));

  world.style.transform = `translate(${mapTransform.tx}px, ${mapTransform.ty}px) scale(${mapTransform.scale})`;
  // 핀 크기 역보정
  const invScale = 1 / mapTransform.scale;
  world.querySelectorAll('.map-pin').forEach(pin => {
    pin.style.transform = `translate(-50%, -100%) scale(${invScale})`;
  });
}

function initMapGestures() {
  if (mapGestureInit) return;
  mapGestureInit = true;

  const body = document.getElementById('settingMapBody');
  if (!body) return;

  let pointers = {};
  let panStart = null;
  let pinchStart = null;
  let longPressTimer = null;
  let longPressTarget = null;

  body.addEventListener('pointerdown', e => {
    if (e.target.closest('.map-pin') || e.target.closest('#mapAddRegionBtn') || e.target.closest('#mapBgPopup')) return;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    const keys = Object.keys(pointers);

    if (keys.length === 1) {
      panStart = { x: e.clientX, y: e.clientY, tx: mapTransform.tx, ty: mapTransform.ty };
      // 롱프레스 → 배경 팝업
      longPressTarget = e.target;
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        openMapBgPopup(e.clientX, e.clientY);
      }, 600);
    } else if (keys.length === 2) {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      panStart = null;
      const pts = keys.map(k => pointers[k]);
      const dx = pts[1].x - pts[0].x, dy = pts[1].y - pts[0].y;
      pinchStart = { dist: Math.sqrt(dx*dx+dy*dy), scale: mapTransform.scale,
        cx: (pts[0].x+pts[1].x)/2, cy: (pts[0].y+pts[1].y)/2,
        tx: mapTransform.tx, ty: mapTransform.ty };
    }
  }, { passive: true });

  body.addEventListener('pointermove', e => {
    if (!pointers[e.pointerId]) return;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    // 움직임 감지 → 롱프레스 취소
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

    const keys = Object.keys(pointers);
    if (keys.length === 2 && pinchStart) {
      const pts = keys.map(k => pointers[k]);
      const dx = pts[1].x - pts[0].x, dy = pts[1].y - pts[0].y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      let newScale = pinchStart.scale * (dist / pinchStart.dist);
      const clampedScale = Math.max(1, Math.min(2, newScale));
      const cx = pinchStart.cx, cy = pinchStart.cy;
      // scale이 clamp된 경우 tx/ty도 clamp 전 비율로만 이동
      const effectiveScale = clampedScale;
      mapTransform.scale = effectiveScale;
      if (newScale >= 1 && newScale <= 2) {
        // clamp 안 걸린 경우 정상 계산
        mapTransform.tx = cx - (cx - pinchStart.tx) * (effectiveScale / pinchStart.scale);
        mapTransform.ty = cy - (cy - pinchStart.ty) * (effectiveScale / pinchStart.scale);
      }
      // clamp 걸린 경우 tx/ty 그대로 (applyMapTransform에서 패닝 제한 적용)
      applyMapTransform();
    } else if (keys.length === 1 && panStart) {
      mapTransform.tx = panStart.tx + (e.clientX - panStart.x);
      mapTransform.ty = panStart.ty + (e.clientY - panStart.y);
      applyMapTransform();
    }
  }, { passive: true });

  const endPointer = e => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    delete pointers[e.pointerId];
    panStart = null; pinchStart = null;
  };
  body.addEventListener('pointerup', endPointer, { passive: true });
  body.addEventListener('pointercancel', endPointer, { passive: true });
}

// ── 지도 렌더 & 핀 ──
function renderMapView() {
  if (!PROJECT_ID) return;
  const world = document.getElementById('mapWorld');
  const body  = document.getElementById('settingMapBody');
  if (!world || !body) return;

  // mapWorld 고정 크기 (2:1)
  world.style.width  = MAP_W + 'px';
  world.style.height = MAP_H + 'px';

  // 배경 이미지
  const bgImg = document.getElementById('mapBgImg');
  const bgPlaceholder = document.getElementById('mapBgPlaceholder');
  const bg = MAP_BG[PROJECT_ID];
  if (bg) {
    bgImg.src = bg;
    bgImg.style.display = 'block';
    bgPlaceholder.style.display = 'none';
  } else {
    bgImg.style.display = 'none';
    bgPlaceholder.style.display = 'flex';
  }

  // 기존 핀 제거
  world.querySelectorAll('.map-pin').forEach(el => el.remove());

  // 핀 생성
  getMapRegions().forEach(item => {
    if (!item.mapPos) item.mapPos = { rx: 0.5, ry: 0.5 };
    world.appendChild(makeMapPin(item));
  });
}

function makeMapPin(item) {
  const pin = document.createElement('div');
  pin.className = 'map-pin';
  pin.dataset.itemId = item.id;

  let px = (item.mapPos.rx ?? 0.5) * MAP_W;
  let py = (item.mapPos.ry ?? 0.5) * MAP_H;
  pin.style.left = px + 'px';
  pin.style.top  = py + 'px';
  pin.style.transform = `translate(-50%, -100%) scale(${1 / mapTransform.scale})`;

  pin.innerHTML = `
    <div class="map-pin-icon">
      <svg viewBox="0 0 24 27" fill="none">
        <path d="M12 2C7.58 2 4 5.58 4 10c0 4 8 15 8 15s8-11 8-15c0-4.42-3.58-8-8-8z" fill="var(--accent-green)"/>
        <circle cx="12" cy="10" r="4.5" fill="#fff"/>
      </svg>
    </div>
    <div class="map-pin-name">${item.name || '지역'}</div>
  `;

  let dragMoved = false;
  pin.addEventListener('pointerdown', e => {
    e.stopPropagation();
    dragMoved = false;
    const toWorld = (cx, cy) => ({
      x: (cx - mapTransform.tx) / mapTransform.scale,
      y: (cy - mapTransform.ty) / mapTransform.scale,
    });
    const startW = toWorld(e.clientX, e.clientY);
    const offsetX = startW.x - px;
    const offsetY = startW.y - py;
    const body2 = document.getElementById('settingMapBody');

    const onMove = ev => {
      dragMoved = true;
      const w = toWorld(ev.clientX, ev.clientY);
      px = Math.min(MAP_W, Math.max(0, w.x - offsetX));
      py = Math.min(MAP_H, Math.max(0, w.y - offsetY));
      pin.style.left = px + 'px';
      pin.style.top  = py + 'px';
      item.mapPos = { rx: px / MAP_W, ry: py / MAP_H };
    };
    const onUp = () => {
      body2.removeEventListener('pointermove', onMove);
      body2.removeEventListener('pointerup', onUp);
      if (!dragMoved) openDetail(item);
    };
    body2.addEventListener('pointermove', onMove);
    body2.addEventListener('pointerup', onUp);
  });

  return pin;
}

function mapAddRegion() {
  if (!PROJECT_ID) return;
  const newId = 'region-' + Date.now();
  const newItem = { id: newId, type: '지역', name: '', desc: '' };
  newItem.mapPos = { rx: 0.5, ry: 0.5 };
  ITEMS.push(newItem);
  STORY_DB[PROJECT_ID] = ITEMS;
  renderSettingList();
  const q = document.querySelector('.search-input-box input');
  if (q) onSearch(q.value);
  renderMapView();
  openDetail(newItem);
}

function mapResetView() {
  const body = document.getElementById('settingMapBody');
  if (!body) return;
  const initScale = 1;
  mapTransform = {
    scale: initScale,
    tx: (body.clientWidth  - MAP_W * initScale) / 2,
    ty: (body.clientHeight - MAP_H * initScale) / 2
  };
  applyMapTransform();
}

// 배경 이미지 팝업
function openMapBgPopup(x, y) {
  const popup = document.getElementById('mapBgPopup');
  const body  = document.getElementById('settingMapBody');
  if (!popup || !body) return;
  const br = body.getBoundingClientRect();
  popup.style.left = Math.min(x - br.left, br.width - 150) + 'px';
  popup.style.top  = Math.min(y - br.top,  br.height - 80) + 'px';
  popup.classList.add('open');
  setTimeout(() => {
    document.addEventListener('pointerdown', closeMapBgPopupOutside, { once: true });
  }, 10);
}
function closeMapBgPopupOutside(e) {
  const popup = document.getElementById('mapBgPopup');
  if (popup && !popup.contains(e.target)) popup.classList.remove('open');
}
function mapBgChange() {
  document.getElementById('mapBgPopup').classList.remove('open');
  document.getElementById('mapBgInput').click();
}
async function mapBgDelete() {
  document.getElementById('mapBgPopup').classList.remove('open');
  if (!PROJECT_ID) return;
  try {
    const oldUrl = (await ref.mapBgUrl(PROJECT_ID).get()).val();
    if (oldUrl) await deleteStorageImage(oldUrl);
    await ref.mapBgUrl(PROJECT_ID).remove();
  } catch (e) { console.error('지도 배경 삭제 실패:', e); }
  delete MAP_BG[PROJECT_ID];
  renderMapView();
}
async function onMapBgSelected(input) {
  if (!input.files[0] || !PROJECT_ID) return;
  const file = input.files[0];
  input.value = '';
  // 로컬 미리보기
  const reader = new FileReader();
  reader.onload = e => {
    MAP_BG[PROJECT_ID] = e.target.result;
    const body2 = document.getElementById('settingMapBody');
    const initScale = 1;
    mapTransform = {
      scale: initScale,
      tx: body2 ? (body2.clientWidth  - MAP_W * initScale) / 2 : 0,
      ty: body2 ? (body2.clientHeight - MAP_H * initScale) / 2 : 0
    };
    renderMapView(); applyMapTransform();
  };
  reader.readAsDataURL(file);
  // 기존 삭제 후 Storage 업로드
  try {
    const oldUrl = (await ref.mapBgUrl(PROJECT_ID).get()).val();
    if (oldUrl) await deleteStorageImage(oldUrl);
    const url = await uploadImage(file, 'mapBg');
    if (url) await ref.mapBgUrl(PROJECT_ID).set(url);
  } catch (e) { console.error('지도 배경 업로드 실패:', e); }
}

//  연호 바텀시트

// 이야기별 연호 데이터
const ERA_DB = {}; // { storyId: [ { id, name, year } ] }

function getEras() {
  if (!PROJECT_ID) return [];
  if (!ERA_DB[PROJECT_ID]) ERA_DB[PROJECT_ID] = [];
  return ERA_DB[PROJECT_ID];
}

let eraEditingId = null; // 수정 중인 연호 id

function openEraSheet() {
  eraEditingId = null;
  document.getElementById('eraNameInput').value = '';
  document.getElementById('eraYearInput').value = '';

  renderEraGraph();
  document.getElementById('eraSheetOverlay').classList.add('open');
}
function closeEraSheet() {
  document.getElementById('eraSheetOverlay').classList.remove('open');
  eraEditingId = null;
}
function onEraSheetOverlayClick(e) {
  if (e.target === document.getElementById('eraSheetOverlay')) closeEraSheet();
}
function saveEraSheet() {
  closeEraSheet();
  // 열린 상세페이지의 period 블록 era select 갱신
  refreshAllEraSelects();
  // 타임라인 재렌더 (연호 필터 목록 갱신)
  renderTimelinePage();
}

function addOrUpdateEra() {
  const name = document.getElementById('eraNameInput').value.trim();
  const year = parseInt(document.getElementById('eraYearInput').value);
  if (!name || isNaN(year)) {
    showEraToast('연호/절대년도가 없습니다.');
    return;
  }
  const eras = getEras();
  if (eraEditingId) {
    // 수정
    const era = eras.find(e => e.id === eraEditingId);
    if (era) { era.name = name; era.year = year; }
    eraEditingId = null;
  } else {
    // 추가 (중복 연호명 체크)
    if (eras.find(e => e.name === name)) {
      showEraToast('이미 있는 연호입니다.');
      return;
    }
    eras.push({ id: 'era-' + Date.now(), name, year });
  }
  document.getElementById('eraNameInput').value = '';
  document.getElementById('eraYearInput').value = '';

  renderEraGraph();
  saveEras();
}

function selectEraForEdit(id) {
  const era = getEras().find(e => e.id === id);
  if (!era) return;
  eraEditingId = id;
  document.getElementById('eraNameInput').value = era.name;
  document.getElementById('eraYearInput').value = era.year;

  renderEraGraph();
}


function renderEraGraph() {
  const graph = document.getElementById('eraGraph');
  const svg   = document.getElementById('eraGraphAxis');
  const wrap  = graph.closest('.era-graph-wrap');
  [...graph.querySelectorAll('.era-graph-marker')].forEach(m => m.remove());

  // 그래프 너비 = wrap 내부 폭 (패딩 20px 양쪽)
  const wrapW  = wrap ? wrap.clientWidth - 40 : 240;
  const graphW = Math.max(240, wrapW);
  graph.style.width = graphW + 'px';

  // SVG 축 그리기 (선은 0~graphW 전체, 화살표만 안쪽으로)
  const cy = 40;
  const aw = 0, ah = 6;
  svg.setAttribute('viewBox', `0 0 ${graphW} 80`);
  svg.innerHTML = `
    <line x1="${aw}" y1="${cy}" x2="${graphW - aw}" y2="${cy}" stroke="var(--border)" stroke-width="1.5"/>
    <polyline points="${aw+ah},${cy-ah} ${aw},${cy} ${aw+ah},${cy+ah}" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="${graphW-aw-ah},${cy-ah} ${graphW-aw},${cy} ${graphW-aw-ah},${cy+ah}" fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  `;

  const eras = getEras().slice().sort((a, b) => a.year - b.year);
  if (eras.length === 0) return;

  const minYear = Math.min(...eras.map(e => e.year));
  const maxYear = Math.max(...eras.map(e => e.year));
  const range   = maxYear - minYear || 1;
  const PAD     = aw + ah + 4; // 화살표 끝에서 여백

  eras.forEach(era => {
    const pct  = eras.length === 1 ? 0.5 : (era.year - minYear) / range;
    const left = PAD + pct * (graphW - PAD * 2);
    const marker = document.createElement('div');
    marker.className = 'era-graph-marker' + (eraEditingId === era.id ? ' era-editing' : '');
    marker.style.left = left + 'px';
    marker.innerHTML = `
      <span class="era-graph-marker-name">${era.name}</span>
      <div class="era-graph-marker-dot"></div>
      <span class="era-graph-marker-year">${era.year}</span>
    `;
    marker.onclick = () => selectEraForEdit(era.id);
    graph.appendChild(marker);
  });
}

function showEraToast(msg) {
  const toast = document.getElementById('eraToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// loadEraOptions 교체 — ERA_DB에서 반환
async function loadEraOptions() {
  return getEras().map(e => ({ id: e.name, name: e.name }));
}
