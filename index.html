// ════════════════════════════════════════
//  관계도 캔버스 핀치줌 + 패닝
// ════════════════════════════════════════
let graphTransform = { scale: 1, tx: 0, ty: 0 };

function applyGraphTransform() {
  const world = document.getElementById('graphWorld');
  if (!world) return;
  const { scale, tx, ty } = graphTransform;
  world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function resetGraphTransform() {
  graphTransform = { scale: 1, tx: 0, ty: 0 };
  const world = document.getElementById('graphWorld');
  if (world) world.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
  applyGraphTransform();
  setTimeout(() => { if (world) world.style.transition = ''; }, 300);
}

function initGraphCanvasGestures() {
  const canvas = document.getElementById('personGraphCanvas');
  const MIN_SCALE = 0.5, MAX_SCALE = 3;
  let pointers = {};
  let lastPinchDist = null;
  let panStart = null;

  canvas.addEventListener('pointerdown', (e) => {
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    const count = Object.keys(pointers).length;
    if (count === 1) {
      // 노드/버튼 위면 패닝 시작 안 함
      if (e.target.closest('.graph-node')) return;
      panStart = { x: e.clientX, y: e.clientY, tx: graphTransform.tx, ty: graphTransform.ty };
    } else if (count === 2) {
      panStart = null;
      const pts = Object.values(pointers);
      lastPinchDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    }
  }, { passive: true });

  canvas.addEventListener('pointermove', (e) => {
    if (!pointers[e.pointerId]) return;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    const count = Object.keys(pointers).length;

    if (count === 2) {
      // 핀치 줌
      const pts = Object.values(pointers);
      const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      if (lastPinchDist) {
        const delta = dist / lastPinchDist;
        const rect = canvas.getBoundingClientRect();
        const cx = (pts[0].x + pts[1].x) / 2 - rect.left;
        const cy = (pts[0].y + pts[1].y) / 2 - rect.top;
        const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, graphTransform.scale * delta));
        const scaleDiff = newScale / graphTransform.scale;
        graphTransform.tx = cx - scaleDiff * (cx - graphTransform.tx);
        graphTransform.ty = cy - scaleDiff * (cy - graphTransform.ty);
        graphTransform.scale = newScale;
        applyGraphTransform();
      }
      lastPinchDist = dist;
    } else if (count === 1 && panStart) {
      // 패닝
      graphTransform.tx = panStart.tx + (e.clientX - panStart.x);
      graphTransform.ty = panStart.ty + (e.clientY - panStart.y);
      applyGraphTransform();
    }
  }, { passive: true });

  const endPointer = (e) => {
    delete pointers[e.pointerId];
    lastPinchDist = null;
    if (Object.keys(pointers).length < 1) panStart = null;
  };
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
}

// ════════════════════════════════════════
//  관계도 데이터
// ════════════════════════════════════════
const GRAPH_NODES = {}; // legacy: 더 이상 위치 저장 안 함 (item.graphPos 사용)
const GRAPH_EDGES = {}; // { storyId: [ {id, from, to, label} ] }

function getGraphNodes() {
  // item.graphPos에서 실시간으로 노드 맵 생성
  if (!PROJECT_ID) return {};
  const nodes = {};
  (STORY_DB[PROJECT_ID] || []).filter(i => i.type === '인물').forEach(p => {
    if (p.graphPos) nodes[p.id] = p.graphPos;
  });
  return nodes;
}
function getGraphEdges() {
  if (!PROJECT_ID) return [];
  if (!GRAPH_EDGES[PROJECT_ID]) GRAPH_EDGES[PROJECT_ID] = [];
  return GRAPH_EDGES[PROJECT_ID];
}

// 인물 추가 시 노드 위치 초기화 (캔버스 중앙) — item.graphPos에 저장
function initGraphNode(personId) {
  const item = (STORY_DB[PROJECT_ID] || []).find(i => i.id === personId);
  if (!item) return;
  if (!item.graphPos) {
    const canvas = document.getElementById('personGraphCanvas');
    const cx = canvas.clientWidth  || window.innerWidth;
    const cy = canvas.clientHeight || window.innerHeight;
    item.graphPos = { x: cx / 2, y: cy / 2 };
  }
}

// ── 관계도 렌더 ──
let graphSelectedIds = []; // 선택된 노드 personId 배열 (최대 2개)

function renderGraphView() {
  const canvas = document.getElementById('personGraphCanvas');
  const svg    = document.getElementById('graphSvg');

  const world = document.getElementById('graphWorld');

  // 캔버스 빈 곳 클릭 시 선택 해제
  canvas.onclick = (e) => {
    if (e.target === canvas || e.target === svg || e.target === world) {
      graphSelectedIds = [];
      renderGraphView();
    }
  };

  // 기존 노드/라벨 제거
  world.querySelectorAll('.graph-node, .graph-edge-label').forEach(el => el.remove());
  // defs 제외하고 SVG 내용만 초기화
  [...svg.children].forEach(el => { if (el.tagName !== 'defs') el.remove(); });
  // SVG 선/화살촉 초기화
  svg.querySelectorAll('line, polyline').forEach(el => el.remove());

  if (!PROJECT_ID) return;

  const persons = (STORY_DB[PROJECT_ID] || []).filter(i => i.type === '인물');
  const nodes   = getGraphNodes();
  const edges   = getGraphEdges();

  // 노드 위치 없으면 초기화
  persons.forEach(p => initGraphNode(p.id));

  // 이미지 원 중심 좌표 계산 헬퍼
  // 노드 div 전체 높이: 이미지64 + gap5 + 이름17 = 86px → 원 중심은 위에서 32px = div중심(43px)보다 11px 위
  const NODE_IMG_OFFSET_Y = 11;
  const imgCenter = (pos) => ({ x: pos.x, y: pos.y - NODE_IMG_OFFSET_Y });

  // SVG 관계선 + 라벨
  edges.forEach(edge => {
    const fromPos = nodes[edge.from];
    const toPos   = nodes[edge.to];
    if (!fromPos || !toPos) return;
    const fc = imgCenter(fromPos), tc = imgCenter(toPos);

    const color = edge.color || 'var(--accent)';
    const NS = 'http://www.w3.org/2000/svg';
    const {x1:lx1, y1:ly1, x2:lx2, y2:ly2} = trimLineToNodes(fc, tc);
    const ah = 6;

    // 선
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', lx1); line.setAttribute('y1', ly1);
    line.setAttribute('x2', lx2); line.setAttribute('y2', ly2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-linecap', 'round');
    line.dataset.edgeId = edge.id;
    svg.appendChild(line);

    // 화살촉 직접 그리기
    function drawArrow(tx, ty, fx, fy) {
      const d = Math.sqrt((tx-fx)**2+(ty-fy)**2)||1;
      const ux=(tx-fx)/d, uy=(ty-fy)/d, px=-uy, py=ux;
      const pl = document.createElementNS(NS, 'polyline');
      pl.setAttribute('points', `${tx-ux*ah+px*ah},${ty-uy*ah+py*ah} ${tx},${ty} ${tx-ux*ah-px*ah},${ty-uy*ah-py*ah}`);
      pl.setAttribute('fill','none'); pl.setAttribute('stroke',color);
      pl.setAttribute('stroke-width','1.5'); pl.setAttribute('stroke-linecap','round'); pl.setAttribute('stroke-linejoin','round');
      pl.dataset.edgeId = edge.id;
      svg.appendChild(pl);
    }
    if (edge.dir==='end' ||edge.dir==='both') drawArrow(lx2,ly2,lx1,ly1);
    if (edge.dir==='start'||edge.dir==='both') drawArrow(lx1,ly1,lx2,ly2);

    if (edge.label) {
      const lbl = document.createElement('div');
      lbl.className = 'graph-edge-label';
      lbl.textContent = edge.label;
      positionEdgeLabel(lbl, fc, tc);
      world.appendChild(lbl);
    }
  });

  // 노드
  persons.forEach(p => {
    const pos = p.graphPos; // item.graphPos 직접 참조
    const imgSrc = (() => {
      const imgBlock = (p.blocks?.blocks || []).find(b => b.type === 'image');
      return imgBlock?.srcs?.[0] || null;
    })();
    const name = (() => {
      const nb = (p.blocks?.blocks || []).find(b => b.type === 'name');
      return nb?.value || p.name || '이름 없음';
    })();

    const node = document.createElement('div');
    node.className = 'graph-node' + (graphSelectedIds.includes(p.id) ? ' selected' : '');
    node.dataset.personId = p.id;
    node.style.left = pos.x + 'px';
    node.style.top  = pos.y + 'px';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'graph-node-img';
    if (imgSrc) {
      const img = document.createElement('img');
      img.src = imgSrc;
      imgWrap.appendChild(img);
    } else {
      imgWrap.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
    }

    // + 아이콘 (2번째 선택 시)
    const addBtn = document.createElement('div');
    addBtn.className = 'graph-node-add' + (graphSelectedIds.length === 2 && graphSelectedIds[1] === p.id ? ' visible' : '');
    addBtn.innerHTML = '+';
    addBtn.onclick = (e) => { e.stopPropagation(); onGraphAddRelation(p.id); };
    addBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    imgWrap.appendChild(addBtn);

    const nameEl = document.createElement('div');
    nameEl.className = 'graph-node-name';
    nameEl.textContent = name;

    node.appendChild(imgWrap);
    node.appendChild(nameEl);

    // 노드 탭 → 선택
    node.addEventListener('pointerdown', (e) => {
      if (e.target === addBtn) return;
      onGraphNodePointerDown(e, p.id, node, pos);
    });

    world.appendChild(node);
  });
}

// ── 노드 선택 & 드래그 ──
function onGraphNodePointerDown(e, personId, nodeEl, pos) {
  e.stopPropagation();
  const canvas = document.getElementById('personGraphCanvas');
  const startX = e.clientX - pos.x;
  const startY = e.clientY - pos.y;
  let moved = false;

  function onMove(ev) {
    moved = true;
    const newX = ev.clientX - startX;
    const newY = ev.clientY - startY;
    pos.x = newX; pos.y = newY;
    nodeEl.style.left = newX + 'px';
    nodeEl.style.top  = newY + 'px';
    // item.graphPos에 실시간 저장
    const item = (STORY_DB[PROJECT_ID] || []).find(i => i.id === personId);
    if (item) item.graphPos = { x: newX, y: newY };
    updateGraphEdges();
  }
  function onUp() {
    canvas.removeEventListener('pointermove', onMove);
    canvas.removeEventListener('pointerup', onUp);
    if (!moved) onGraphNodeTap(personId);
  }
  canvas.addEventListener('pointermove', onMove);
  canvas.addEventListener('pointerup', onUp);
}

function onGraphNodeTap(personId) {
  if (graphSelectedIds.includes(personId)) {
    // 선택 해제
    graphSelectedIds = graphSelectedIds.filter(id => id !== personId);
  } else if (graphSelectedIds.length < 2) {
    graphSelectedIds.push(personId);
  } else {
    // 이미 2개 선택된 상태 → 초기화 후 새로 선택
    graphSelectedIds = [personId];
  }
  renderGraphView();
}

function onGraphAddRelation(toId) {
  const fromId = graphSelectedIds[0];
  if (!fromId || fromId === toId) return;
  openRelationSheet(fromId, toId);
}

//  관계 추가 바텀시트
// ════════════════════════════════════════
const RELATION_COLORS = ['#2C2825','#E74C3C','#E67E22','#F1C40F','#2ECC71','#3498DB','#9B59B6','#EC407A'];
let relationSheetData = { fromId: null, toId: null, dir: 'none', color: '#2C2825', editEdgeId: null };

function getPersonName(personId) {
  const item = (STORY_DB[PROJECT_ID] || []).find(i => i.id === personId);
  if (!item) return '이름 없음';
  const nb = (item.blocks?.blocks || []).find(b => b.type === 'name');
  return nb?.value || item.name || '이름 없음';
}

function openRelationSheet(fromId, toId) {
  // 기존 관계 있으면 수정 모드
  const edges = getGraphEdges();
  const existing = edges.find(e =>
    (e.from === fromId && e.to === toId) ||
    (e.from === toId   && e.to === fromId)
  );
  relationSheetData = {
    fromId, toId,
    dir:   existing?.dir   || 'none',
    color: existing?.color || '#2C2825',
    editEdgeId: existing?.id || null
  };

  document.getElementById('relationFromName').textContent = getPersonName(fromId);
  document.getElementById('relationToName').textContent   = getPersonName(toId);
  document.getElementById('relationLabelInput').value     = existing?.label || '';

  renderRelationDir();
  renderRelationColors();
  document.getElementById('relationSheetOverlay').classList.add('open');
}

function closeRelationSheet() {
  document.getElementById('relationSheetOverlay').classList.remove('open');
  graphSelectedIds = [];
  renderGraphView();
}

function onRelationSheetOverlayClick(e) {
  if (e.target === document.getElementById('relationSheetOverlay')) closeRelationSheet();
}

function saveRelationSheet() {
  const edges = getGraphEdges();
  const label = document.getElementById('relationLabelInput').value.trim();
  const { fromId, toId, dir, color, editEdgeId } = relationSheetData;

  if (editEdgeId) {
    const edge = edges.find(e => e.id === editEdgeId);
    if (edge) { edge.label = label; edge.dir = dir; edge.color = color; }
  } else {
    edges.push({ id: 'edge-' + Date.now(), from: fromId, to: toId, label, dir, color });
  }
  closeRelationSheet();
}

// 선 방향 순환: none → end → start → both
function cycleRelationDir() {
  const dirs = ['none', 'end', 'start', 'both'];
  const idx = dirs.indexOf(relationSheetData.dir);
  relationSheetData.dir = dirs[(idx + 1) % dirs.length];
  renderRelationDir();
}

function renderRelationDir() {
  const line        = document.getElementById('relationDirLine');
  const arrowEnd    = document.getElementById('relationArrowEnd');
  const arrowStart  = document.getElementById('relationArrowStart');
  const { dir, color } = relationSheetData;
  line.setAttribute('stroke', color);
  arrowEnd.setAttribute('stroke', color);
  arrowStart.setAttribute('stroke', color);
  arrowEnd.style.display   = (dir === 'end'   || dir === 'both') ? '' : 'none';
  arrowStart.style.display = (dir === 'start' || dir === 'both') ? '' : 'none';
}

function renderRelationColors() {
  const row = document.getElementById('relationColorRow');
  row.innerHTML = '';
  RELATION_COLORS.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'relation-color-chip' + (c === relationSheetData.color ? ' selected' : '');
    chip.style.background = c;
    chip.onclick = () => {
      relationSheetData.color = c;
      renderRelationColors();
      renderRelationDir();
    };
    row.appendChild(chip);
  });
}

// 선 끝점 trim 헬퍼 (노드 원 경계까지)
const NODE_R = 34;
function trimLineToNodes(fc, tc) {
  const dist = Math.sqrt((tc.x-fc.x)**2 + (tc.y-fc.y)**2) || 1;
  const ux = (tc.x - fc.x) / dist;
  const uy = (tc.y - fc.y) / dist;
  return {
    x1: fc.x + ux * NODE_R, y1: fc.y + uy * NODE_R,
    x2: tc.x - ux * NODE_R, y2: tc.y - uy * NODE_R,
  };
}

// 라벨 위치/회전 계산
// 항상 선 중심에서 수직 위쪽으로 오프셋, 수직선일 때는 왼쪽
function positionEdgeLabel(lbl, fc, tc) {
  const OFFSET = 10; // 선 중심에서 라벨 센터까지 거리
  const mx = (fc.x + tc.x) / 2;
  const my = (fc.y + tc.y) / 2;
  const dx = tc.x - fc.x;
  const dy = tc.y - fc.y;
  const angle = Math.atan2(dy, dx); // 선 각도 (라디안)

  // 수직 방향 벡터 (-sin, cos) = 선에 수직인 "위쪽"
  let nx = -Math.sin(angle);
  let ny =  Math.cos(angle);

  // ny > 0 이면 화면 아래 방향 → 반전
  if (ny > 0) { nx = -nx; ny = -ny; }

  // 수직선 예외 (dx ≈ 0): 왼쪽으로
  if (Math.abs(dx) < 1) { nx = -1; ny = 0; }

  const lx = mx + nx * OFFSET;
  const ly = my + ny * OFFSET;

  // 회전각: 글자 뒤집힘 방지 (-90~90도 범위로)
  let deg = angle * 180 / Math.PI;
  if (deg > 90)  deg -= 180;
  if (deg < -90) deg += 180;

  lbl.style.left = lx + 'px';
  lbl.style.top  = ly + 'px';
  lbl.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
}

// SVG 선만 위치 업데이트 (드래그 중 실시간)
function updateGraphEdges() {
  const svg   = document.getElementById('graphSvg');
  const nodes = getGraphNodes();
  const edges = getGraphEdges();
  const NODE_IMG_OFFSET_Y = 11;
  const ic = (pos) => ({ x: pos.x, y: pos.y - NODE_IMG_OFFSET_Y });
  // 선+화살촉 모두 제거 후 재렌더
  svg.querySelectorAll('line, polyline').forEach(el => el.remove());
  const ah = 6;
  edges.forEach(edge => {
    const f = nodes[edge.from], t = nodes[edge.to];
    if (!f || !t) return;
    const fc = ic(f), tc = ic(t);
    const {x1, y1, x2, y2} = trimLineToNodes(fc, tc);
    const color = edge.color || 'var(--accent)';
    const NS = 'http://www.w3.org/2000/svg';

    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-linecap', 'round');
    line.dataset.edgeId = edge.id;
    svg.appendChild(line);

    function drawArrow(tx, ty, fx, fy) {
      const d = Math.sqrt((tx-fx)**2+(ty-fy)**2)||1;
      const ux=(tx-fx)/d, uy=(ty-fy)/d, px=-uy, py=ux;
      const pl = document.createElementNS(NS, 'polyline');
      pl.setAttribute('points', `${tx-ux*ah+px*ah},${ty-uy*ah+py*ah} ${tx},${ty} ${tx-ux*ah-px*ah},${ty-uy*ah-py*ah}`);
      pl.setAttribute('fill','none'); pl.setAttribute('stroke',color);
      pl.setAttribute('stroke-width','1.5'); pl.setAttribute('stroke-linecap','round'); pl.setAttribute('stroke-linejoin','round');
      pl.dataset.edgeId = edge.id;
      svg.appendChild(pl);
    }
    if (edge.dir==='end' ||edge.dir==='both') drawArrow(x2,y2,x1,y1);
    if (edge.dir==='start'||edge.dir==='both') drawArrow(x1,y1,x2,y2);
  });
  // 라벨 위치도 업데이트
  const canvas = document.getElementById('personGraphCanvas');
  const world = document.getElementById('graphWorld');
  world.querySelectorAll('.graph-edge-label').forEach((lbl, i) => {
    const edge = edges[i];
    if (!edge) return;
    const f = nodes[edge.from], t = nodes[edge.to];
    if (!f || !t) return;
    const fc = ic(f), tc = ic(t);
    positionEdgeLabel(lbl, fc, tc);
  });
}

//  인물 페이지 데이터 (이야기별 그룹)
// ════════════════════════════════════════
// { [storyId]: [ { id, name, expanded, personIds:[] } ] }
const PERSON_GROUPS = {
  'story-1': [
    { id: 'pgroup-1', name: '새 그룹', expanded: true, personIds: ['person-1'] }
  ],
};

function getPersonGroups() {
  if (!PROJECT_ID) return [];
  if (!PERSON_GROUPS[PROJECT_ID]) PERSON_GROUPS[PROJECT_ID] = [];
  return PERSON_GROUPS[PROJECT_ID];
}

// 블록에서 값 추출 헬퍼
function getBlockValue(blocks, type) {
  if (!blocks || !blocks.blocks) return null;
  return blocks.blocks.find(b => b.type === type) || null;
}

// ── 인물 리스트 렌더 ──
function renderPersonList() {
  const body = document.getElementById('personListBody');
  body.innerHTML = '';
  const persons = ITEMS.filter(i => i.type === '인물');
  const groups = getPersonGroups();
  const grouped = new Set(groups.flatMap(g => g.personIds));
  const ungrouped = persons.filter(p => !grouped.has(p.id));

  // 그룹 상단 인디케이터 (그룹 이동용)
  body.appendChild(makePersonDropIndicator('top-group', null, null, null));

  // 그룹 렌더
  groups.forEach((group, groupIdx) => {
    const groupPersons = group.personIds
      .map(id => persons.find(p => p.id === id))
      .filter(Boolean);

    // 이 그룹 앞에 오는 top-group 인디케이터에 before-group 마킹
    const prevInd = body.lastElementChild;
    if (prevInd && prevInd.classList.contains('person-drop-indicator')) {
      prevInd.dataset.beforeGroup = group.id;
    }

    const groupHeader = makePersonGroupHeader(group, groupPersons.length);
    groupHeader.dataset.groupId = group.id;
    if (groupIdx === 0) groupHeader.style.marginTop = '0';
    attachPersonLongPress(groupHeader, group.id, 'group', group.name);
    body.appendChild(groupHeader);

    if (group.expanded) {
      // 그룹 안 카드 상단 인디케이터
      body.appendChild(makePersonDropIndicator('child', group.id, null, null));
      groupPersons.forEach(p => {
        const card = makePersonCard(p);
        card.dataset.personId = p.id;
        card.dataset.groupId = group.id;
        attachPersonLongPress(card, p.id, 'person', p.name || '새 인물');
        body.appendChild(card);
        body.appendChild(makePersonDropIndicator('child', group.id, p.id, null));
      });
    }

    // 그룹 하단 top 인디케이터 (다음 그룹 앞에 위치 = 이 그룹 아래)
    const nextGroupId = groups[groups.indexOf(group) + 1]?.id || null;
    const bottomInd = makePersonDropIndicator('top-group', null, null, null);
    if (nextGroupId) bottomInd.dataset.beforeGroup = nextGroupId;
    body.appendChild(bottomInd);
  });

  // 기타 (미분류) - 항상 표시
  const etcGroup = { id: '__etc__', name: '기타', expanded: true };
  if (PERSON_GROUPS._etcExpanded === undefined) PERSON_GROUPS._etcExpanded = true;
  etcGroup.expanded = PERSON_GROUPS._etcExpanded;

  const etcHeader = makePersonGroupHeader(etcGroup, ungrouped.length, true);
  etcHeader.dataset.groupId = '__etc__';
  if (groups.length === 0) etcHeader.style.marginTop = '0';
  body.appendChild(etcHeader);
  if (etcGroup.expanded) {
    body.appendChild(makePersonDropIndicator('etc', null, null, null));
    ungrouped.forEach(p => {
      const card = makePersonCard(p);
      card.dataset.personId = p.id;
      attachPersonLongPress(card, p.id, 'person', p.name || '새 인물');
      body.appendChild(card);
      body.appendChild(makePersonDropIndicator('etc', null, p.id, null));
    });
  }

  if (!persons.length) {
    const empty = document.createElement('p');
    empty.style.cssText = 'text-align:center;color:var(--text-secondary);font-size:14px;padding:40px 0;';
    empty.textContent = '인물이 없습니다';
    body.appendChild(empty);
  }

  // 하단 그룹 추가 버튼
  const addGroupBtn = document.createElement('button');
  addGroupBtn.style.cssText = 'display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--text-secondary);font-family:inherit;font-size:14px;padding:12px 0;width:100%;';
  addGroupBtn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>그룹 추가`;
  addGroupBtn.onclick = addPersonGroup;
  body.appendChild(addGroupBtn);
}

function makePersonDropIndicator(level, groupId, afterId, beforeGroupId) {
  const el = document.createElement('div');
  el.className = 'person-drop-indicator';
  el.dataset.level = level;
  if (groupId) el.dataset.group = groupId;
  if (afterId) el.dataset.after = afterId;
  if (beforeGroupId) el.dataset.beforeGroup = beforeGroupId;
  return el;
}

function makePersonGroupHeader(group, count, isEtc = false) {
  const wrap = document.createElement('div');
  wrap.className = 'person-group-header';
  wrap.dataset.groupId = group.id;

  const toggle = document.createElement('div');
  toggle.className = 'person-group-toggle' + (group.expanded ? ' expanded' : '');
  toggle.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;
  toggle.onclick = () => {
    group.expanded = !group.expanded;
    if (isEtc) PERSON_GROUPS._etcExpanded = group.expanded;
    renderPersonList();
  };

  const title = document.createElement('span');
  title.className = 'person-group-title';
  title.textContent = group.name;

  wrap.appendChild(toggle);
  wrap.appendChild(title);

  const more = document.createElement('button');
  more.className = 'person-group-more';
  more.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>`;
  more.onclick = (e) => openPersonGroupPopup(e, group.id, isEtc);
  wrap.appendChild(more);

  return wrap;
}

function makePersonCard(item) {
  const card = document.createElement('div');
  card.className = 'person-card';
  card.onclick = () => openDetail(item);

  // 썸네일
  const thumb = document.createElement('div');
  thumb.className = 'person-thumb';
  const imgBlock = getBlockValue(item.blocks, 'image');
  if (imgBlock && imgBlock.srcs && imgBlock.srcs[0]) {
    const img = document.createElement('img');
    img.src = imgBlock.srcs[0];
    thumb.appendChild(img);
  } else {
    thumb.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;
  }

  // 텍스트
  const text = document.createElement('div');
  text.className = 'person-card-text';

  // 이름 / 태그 (한 줄)
  const nameRow = document.createElement('div');
  nameRow.className = 'person-card-name' + (!item.name ? ' empty' : '');
  const nameBlock = getBlockValue(item.blocks, 'name');
  const nameVal = nameBlock ? nameBlock.value : item.name;
  const tagBlock = getBlockValue(item.blocks, 'tag');
  const tagVal = tagBlock && tagBlock.tags && tagBlock.tags.length ? tagBlock.tags.join(', ') : '';
  nameRow.textContent = nameVal
    ? (tagVal ? `${nameVal} / ${tagVal}` : nameVal)
    : `새 인물`;
  text.appendChild(nameRow);

  // 설명 (최대 2줄)
  const descEl = document.createElement('div');
  descEl.className = 'person-card-desc';
  const contentBlock = getBlockValue(item.blocks, 'content');
  const descVal = contentBlock ? contentBlock.value : item.desc;
  if (descVal) {
    descEl.textContent = descVal;
  } else {
    descEl.textContent = '내용 없음';
    descEl.style.color = 'var(--text-secondary)';
  }
  text.appendChild(descEl);

  card.appendChild(thumb);
  card.appendChild(text);
  return card;
}

function addPersonGroup() {
  const groups = getPersonGroups();
  groups.push({ id: 'pgroup-' + Date.now(), name: '새 그룹', expanded: true, personIds: [] });
  renderPersonList();
  savePersonGroups();
}

// ── 인물 드래그 ──
let personDrag = null;

function attachPersonLongPress(el, id, type, name) {
  let timer = null;
  const onStart = e => {
    if (e.target.closest('button')) return; // ... 버튼 클릭 방지
    const touch = e.touches ? e.touches[0] : e;
    timer = setTimeout(() => {
      e.preventDefault();
      startPersonDrag(id, type, name, el, touch.clientX, touch.clientY);
    }, 500);
  };
  const onCancel = () => { clearTimeout(timer); timer = null; };
  el.addEventListener('touchstart', onStart, { passive: true });
  el.addEventListener('touchend', onCancel);
  el.addEventListener('touchmove', onCancel, { passive: true });
  el.addEventListener('mousedown', onStart);
  el.addEventListener('mouseup', onCancel);
  el.addEventListener('mousemove', onCancel);
}

function startPersonDrag(id, type, name, srcEl, x, y) {
  const iconSvg = type === 'group'
    ? `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`
    : `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;
  const ghost = document.createElement('div');
  ghost.className = 'person-drag-ghost';
  ghost.innerHTML = iconSvg + `<span>${name}</span>`;
  ghost.style.left = (x - 20) + 'px';
  ghost.style.top  = (y - 20) + 'px';
  document.body.appendChild(ghost);
  srcEl.classList.add('person-dragging');
  personDrag = { id, type, srcEl, ghost };

  document.addEventListener('touchmove', onPersonDragMove, { passive: false });
  document.addEventListener('touchend',  onPersonDragEnd);
  document.addEventListener('mousemove', onPersonDragMove);
  document.addEventListener('mouseup',   onPersonDragEnd);
}

function onPersonDragMove(e) {
  if (!personDrag) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const x = touch.clientX, y = touch.clientY;
  personDrag.ghost.style.left = (x - 20) + 'px';
  personDrag.ghost.style.top  = (y - 20) + 'px';

  document.querySelectorAll('.person-drop-indicator.visible').forEach(el => {
    el.classList.remove('visible', 'indented');
  });
  document.querySelectorAll('.person-group-drop-target').forEach(el => el.classList.remove('person-group-drop-target'));

  if (personDrag.type === 'group') {
    // 그룹 드래그: top-group 인디케이터만
    const inds = [...document.querySelectorAll('.person-drop-indicator[data-level="top-group"]')];
    let closest = null, closestDist = Infinity;
    inds.forEach(ind => {
      const r = ind.getBoundingClientRect();
      const dist = Math.abs(y - (r.top + r.height / 2));
      if (dist < closestDist) { closestDist = dist; closest = ind; }
    });
    if (closest) closest.classList.add('visible');

  } else {
    // 카드 드래그: 그룹 헤더 3등분으로 판단
    const groupHeaders = [...document.querySelectorAll('[data-group-id]')];
    let handled = false;

    for (const gh of groupHeaders) {
      const r = gh.getBoundingClientRect();
      if (y < r.top || y > r.bottom) continue;

      const groupId = gh.dataset.groupId;
      const group = getPersonGroups().find(g => g.id === groupId);
      const isExpanded = group ? group.expanded : false;
      const third = r.height / 3;

      if (y < r.top + third) {
        // 상단: 그룹 위 라인 (top-group 인디케이터, 이 그룹 앞)
        const ind = document.querySelector(`.person-drop-indicator[data-level="top-group"][data-before-group="${groupId}"]`);
        if (ind) ind.classList.add('visible');
      } else if (y > r.bottom - third) {
        // 하단: 그룹 아래 라인
        // 그룹 헤더 다음에 오는 top-group 인디케이터를 DOM에서 직접 찾기
        const findBottomInd = (headerEl) => {
          let el = headerEl.nextElementSibling;
          while (el) {
            if (el.classList.contains('person-drop-indicator') &&
                (el.dataset.level === 'top-group')) return el;
            el = el.nextElementSibling;
          }
          return null;
        };

        if (isExpanded) {
          const childInds = [...document.querySelectorAll(`.person-drop-indicator[data-level="child"][data-group="${groupId}"]`)];
          const hasChildren = childInds.length >= 2;
          if (hasChildren) {
            const last = childInds[childInds.length - 1];
            if (last) last.classList.add('visible', 'indented');
          } else {
            const ind = findBottomInd(gh);
            if (ind) ind.classList.add('visible');
          }
        } else {
          const ind = findBottomInd(gh);
          if (ind) ind.classList.add('visible');
        }
      } else {
        // 중간: 그룹 테두리
        gh.classList.add('person-group-drop-target');
      }
      handled = true;
      break;
    }

    if (!handled) {
      // 그룹 헤더 바깥: etc/bottom 인디케이터 포함해서 가장 가까운 것
      const inds = [...document.querySelectorAll(
        '.person-drop-indicator[data-level="child"], .person-drop-indicator[data-level="etc"]'
      )];
      let closest = null, closestDist = Infinity;
      inds.forEach(ind => {
        const r = ind.getBoundingClientRect();
        const dist = Math.abs(y - (r.top + r.height / 2));
        if (dist < closestDist) { closestDist = dist; closest = ind; }
      });
      if (closest) {
        const isChild = closest.dataset.level === 'child';
        closest.classList.add('visible');
        if (isChild) closest.classList.add('indented');
      }
    }
  }
}

function onPersonDragEnd() {
  if (!personDrag) return;

  const ind = document.querySelector('.person-drop-indicator.visible');
  const groupTarget = document.querySelector('.person-group-drop-target');
  const groups = getPersonGroups();
  const { id, type } = personDrag;

  if (type === 'group') {
    if (ind) {
      // 그룹 순서 이동
      const beforeGroupId = ind.dataset.beforeGroup || null;
      const idx = groups.findIndex(g => g.id === id);
      if (idx !== -1) {
        const [moved] = groups.splice(idx, 1);
        if (beforeGroupId) {
          const ti = groups.findIndex(g => g.id === beforeGroupId);
          groups.splice(ti, 0, moved);
        } else {
          groups.push(moved);
        }
      }
    }
  } else {
    // 카드 이동
    let fromGroupId = null;
    for (const g of groups) {
      if (g.personIds.includes(id)) { fromGroupId = g.id; break; }
    }

    if (groupTarget) {
      // 테두리 인디케이터 → 그룹 내 최하단 or 기타로 이동
      const toGroupId = groupTarget.dataset.groupId;
      if (fromGroupId) groups.find(g => g.id === fromGroupId).personIds = groups.find(g => g.id === fromGroupId).personIds.filter(pid => pid !== id);
      if (toGroupId === '__etc__') {
        // 기타 그룹 → 미분류 상태로 (어떤 그룹에도 없는 상태)
      } else {
        const toGroup = groups.find(g => g.id === toGroupId);
        if (toGroup) toGroup.personIds.push(id);
      }
    } else if (ind) {
      const level = ind.dataset.level;
      const toGroupId = ind.dataset.group || null;
      const afterId = ind.dataset.after || null;

      // 원본에서 제거
      if (fromGroupId) groups.find(g => g.id === fromGroupId).personIds = groups.find(g => g.id === fromGroupId).personIds.filter(pid => pid !== id);

      if (level === 'child' && toGroupId) {
        const toGroup = groups.find(g => g.id === toGroupId);
        if (toGroup) {
          if (afterId) {
            const ai = toGroup.personIds.indexOf(afterId);
            toGroup.personIds.splice(ai + 1, 0, id);
          } else {
            toGroup.personIds.unshift(id);
          }
        }
      }
      // etc / bottom → 미분류 상태로 (어떤 그룹에도 없는 상태 = 기타에 표시됨)
    }
  }

  personDrag.ghost.remove();
  personDrag.srcEl.classList.remove('person-dragging');
  document.querySelectorAll('.person-drop-indicator.visible').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.person-group-drop-target').forEach(el => el.classList.remove('person-group-drop-target'));
  personDrag = null;
  document.removeEventListener('touchmove', onPersonDragMove);
  document.removeEventListener('touchend',  onPersonDragEnd);
  document.removeEventListener('mousemove', onPersonDragMove);
  document.removeEventListener('mouseup',   onPersonDragEnd);
  renderPersonList();
  savePersonGroups();
  saveItemsOrder();
}

// 인물 그룹 컨텍스트 팝업
let personGroupCtxId = null;
function openPersonGroupPopup(e, groupId, isEtc = false) {
  e.stopPropagation();
  personGroupCtxId = groupId;
  const popup = document.getElementById('personGroupPopup');
  popup.classList.add('open');
  // 기타 그룹: 이름변경/삭제 숨김
  popup.querySelector('[onclick="personGroupRename()"]').style.display = isEtc ? 'none' : '';
  popup.querySelector('[onclick="personGroupDelete()"]').style.display = isEtc ? 'none' : '';
  const rect = e.currentTarget.getBoundingClientRect();
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
}
function closePersonGroupPopup() {
  document.getElementById('personGroupPopup').classList.remove('open');
  personGroupCtxId = null;
}
function personGroupRename() {
  if (!personGroupCtxId) return;
  const group = getPersonGroups().find(g => g.id === personGroupCtxId);
  const gid = personGroupCtxId;
  closePersonGroupPopup();
  if (!group) return;
  // 인라인 input으로 이름 변경 (prompt 대신)
  const header = document.querySelector(`.person-group-header[data-group-id="${gid}"] .person-group-title`);
  if (!header) return;
  const currentName = group.name;
  const input = document.createElement('input');
  input.type = 'text'; input.value = currentName;
  input.style.cssText = 'flex:1;border:none;outline:none;background:none;font-family:inherit;font-size:14px;font-weight:700;color:inherit;padding:0;min-width:0;';
  header.replaceWith(input); input.focus(); input.select();
  let committed = false;
  const commit = () => {
    if (committed) return; committed = true;
    group.name = input.value.trim() || currentName;
    renderPersonList();
    savePersonGroups();
  };
  input.addEventListener('blur', () => setTimeout(commit, 0));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }
  });
}
function personGroupDelete() {
  if (!personGroupCtxId) return;
  const groups = getPersonGroups();
  const idx = groups.findIndex(g => g.id === personGroupCtxId);
  closePersonGroupPopup();
  if (idx !== -1) { groups.splice(idx, 1); renderPersonList(); savePersonGroups(); }
}
function personGroupAddPerson() {
  if (!personGroupCtxId) return;
  const isEtc = personGroupCtxId === '__etc__';
  const group = isEtc ? null : getPersonGroups().find(g => g.id === personGroupCtxId);
  closePersonGroupPopup();
  if (!isEtc && !group) return;
  const newId = 'person-' + Date.now();
  ITEMS.push({ id: newId, type: '인물', name: '', desc: '' });
  STORY_DB[PROJECT_ID] = ITEMS;
  if (group) group.personIds.push(newId);
  initGraphNode(newId);
  const q = document.querySelector('.search-input-box input');
  if (q) onSearch(q.value);
  renderPersonList();
  savePersonGroups();
  const newItem = ITEMS.find(i => i.id === newId);
  if (newItem) openDetail(newItem);
}

function renderPlotList() {

  body.appendChild(makePlotInd('top-group', null, null));

  groups.forEach((group, gi) => {
    // before-group 마킹
    const prevInd = body.lastElementChild;
    if (prevInd && prevInd.classList.contains('plot-drop-indicator')) prevInd.dataset.beforeGroup = group.id;

    // 그룹 헤더
    const header = document.createElement('div');
    header.className = 'plot-group-header';
    header.dataset.groupId = group.id;
    if (gi === 0) header.style.marginTop = '0';

    const toggle = document.createElement('div');
    toggle.className = 'plot-group-toggle' + (group.expanded ? ' expanded' : '');
    toggle.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;
    toggle.onclick = e => { e.stopPropagation(); group.expanded = !group.expanded; renderPlotList(); };

    const title = document.createElement('span');
    title.className = 'plot-group-title';
    title.textContent = group.name;

    const more = document.createElement('button');
    more.className = 'plot-group-more';
    more.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>`;
    more.onclick = e => openPlotGroupPopup(e, group.id);

    header.appendChild(toggle); header.appendChild(title); header.appendChild(more);
    attachPlotLongPress(header, group.id, 'group', group.name);
    body.appendChild(header);

    if (group.expanded) {
      const childWrap = document.createElement('div');
      childWrap.dataset.groupId = group.id;

      childWrap.appendChild(makePlotInd('child', group.id, null));
      group.parts.forEach((part) => {
        childWrap.appendChild(makePlotPartEl(part, group.id));
        childWrap.appendChild(makePlotInd('child', group.id, part.id));
      });
      body.appendChild(childWrap);
    }

    // 그룹 하단 top-group 인디케이터
    const nextGroupId = groups[gi + 1]?.id || null;
    const bottomInd = makePlotInd('top-group', null, null);
    if (nextGroupId) bottomInd.dataset.beforeGroup = nextGroupId;
    else bottomInd.dataset.beforeGroup = '__etc_plot__';
    body.appendChild(bottomInd);
  });

  // 기타 그룹 (항상 표시)
  if (!PLOT_ETC_STATE[PROJECT_ID]) PLOT_ETC_STATE[PROJECT_ID] = { expanded: true };
  const etcExpanded = PLOT_ETC_STATE[PROJECT_ID].expanded;
  const etcParts = getPlotEtcParts();

  const etcHeader = document.createElement('div');
  etcHeader.className = 'plot-group-header';
  etcHeader.dataset.groupId = '__etc_plot__';
  if (groups.length === 0) etcHeader.style.marginTop = '0';

  const etcToggle = document.createElement('div');
  etcToggle.className = 'plot-group-toggle' + (etcExpanded ? ' expanded' : '');
  etcToggle.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;
  etcToggle.onclick = e => { e.stopPropagation(); PLOT_ETC_STATE[PROJECT_ID].expanded = !PLOT_ETC_STATE[PROJECT_ID].expanded; renderPlotList(); };

  const etcTitle = document.createElement('span');
  etcTitle.className = 'plot-group-title';
  etcTitle.textContent = '기타';

  const etcMore = document.createElement('button');
  etcMore.className = 'plot-group-more';
  etcMore.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>`;
  etcMore.onclick = e => openPlotGroupPopup(e, '__etc_plot__', true);

  etcHeader.appendChild(etcToggle); etcHeader.appendChild(etcTitle); etcHeader.appendChild(etcMore);
  attachPlotLongPress(etcHeader, '__etc_plot__', 'group', '기타');
  body.appendChild(etcHeader);

  if (etcExpanded) {
    const etcChildWrap = document.createElement('div');
    etcChildWrap.dataset.groupId = '__etc_plot__';
    etcChildWrap.appendChild(makePlotInd('child', '__etc_plot__', null));
    etcParts.forEach((part) => {
      etcChildWrap.appendChild(makePlotPartEl(part, '__etc_plot__'));
      etcChildWrap.appendChild(makePlotInd('child', '__etc_plot__', part.id));
    });
    body.appendChild(etcChildWrap);
  }
  // 기타 아래 bottom top-group 인디케이터 없음 (기타가 최하단)

  // 그룹 추가 버튼
  const addBtn = document.createElement('button');
  addBtn.style.cssText = 'display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--text-secondary);font-family:inherit;font-size:14px;padding:12px 0;width:100%;';
  addBtn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>그룹 추가`;
  addBtn.onclick = addPlotGroup;
  body.appendChild(addBtn);
}

function makePlotPartEl(part, groupId) {
  const wrap = document.createElement('div');
  wrap.className = 'plot-part';
  wrap.dataset.partId = part.id;
  wrap.dataset.groupId = groupId;

  // 파트 헤더
  const header = document.createElement('div');
  header.className = 'plot-part-header';

  const toggle = document.createElement('div');
  toggle.className = 'plot-part-toggle' + (part.expanded ? ' expanded' : '');
  toggle.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;

  const titleInput = document.createElement('input');
  titleInput.className = 'plot-part-title';
  titleInput.type = 'text';
  titleInput.value = part.title;
  titleInput.placeholder = '파트 제목...';
  titleInput.readOnly = true;
  titleInput.onchange = () => { part.title = titleInput.value; };

  let partEditing = false;
  let partDeletePending = false;

  const exitEditing = () => {
    partEditing = false;
    titleInput.classList.remove('editing');
    titleInput.readOnly = true;
    part.title = titleInput.value;
    toggle.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;
    toggle.style.color = '';
  };

  titleInput.addEventListener('click', e => {
    e.stopPropagation();
    if (!partEditing) {
      partEditing = true;
      titleInput.classList.add('editing');
      titleInput.readOnly = false;
      titleInput.focus();
      titleInput.select();
      toggle.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      toggle.style.color = 'var(--red)';
    }
  });

  titleInput.addEventListener('blur', () => {
    if (partDeletePending) return;
    exitEditing();
    savePlotData();
  });

  toggle.addEventListener('mousedown', e => {
    if (partEditing) { e.preventDefault(); partDeletePending = true; }
  });
  toggle.addEventListener('touchstart', () => {
    if (partEditing) partDeletePending = true;
  }, { passive: true });
  toggle.addEventListener('click', e => {
    e.stopPropagation();
    if (partDeletePending) {
      partDeletePending = false;
      exitEditing();
      openConfirmDeleteDialog('이 파트를 삭제하시겠습니까?', () => {
        let deleted = false;
        for (const g of getPlotGroups()) {
          const i = g.parts.findIndex(p => p.id === part.id);
          if (i !== -1) { g.parts.splice(i, 1); deleted = true; break; }
        }
        if (!deleted) {
          const etc = getPlotEtcParts();
          const i = etc.findIndex(p => p.id === part.id);
          if (i !== -1) etc.splice(i, 1);
        }
        renderPlotList();
        savePlotData();
      });
    } else if (!partEditing) {
      part.expanded = !part.expanded; renderPlotList();
    }
  });

  const addBlockBtn = document.createElement('button');
  addBlockBtn.className = 'plot-part-add';
  addBlockBtn.innerHTML = `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
  addBlockBtn.onclick = e => { e.stopPropagation(); addPlotBlock(groupId, part.id); };

  header.appendChild(toggle); header.appendChild(titleInput); header.appendChild(addBlockBtn);
  attachPlotLongPress(header, part.id, 'part', part.title || '파트');
  wrap.appendChild(header);

  if (part.expanded && part.blocks.length) {
    const partBody = document.createElement('div');
    partBody.className = 'plot-part-body';
    // 블록 위 인디케이터
    partBody.appendChild(makePlotInd('block', part.id, null, groupId));
    part.blocks.forEach(block => {
      partBody.appendChild(makePlotBlockEl(block, part, groupId));
      partBody.appendChild(makePlotInd('block', part.id, block.id, groupId));
    });
    wrap.appendChild(partBody);
  }

  return wrap;
}

  wrap.className = 'plot-block';
  wrap.dataset.blockId = block.id;
  wrap.dataset.partId = part.id;

    preview.textContent = ta.value || '내용을 입력하세요...';
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  };

  let blockEditing = false;
  let blockDeletePending = false;

  const exitBlockEditing = () => {
    blockEditing = false;

    ta.style.userSelect = 'none';
    ta.style.webkitUserSelect = 'none';

    bToggle.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;

      blockEditing = true;

      ta.style.userSelect = 'text';
      ta.style.webkitUserSelect = 'text';
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      bToggle.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      bToggle.style.color = 'var(--red)';
    }
  });

  ta.addEventListener('blur', () => {
    if (blockDeletePending) return;
    block.content = ta.value;
    exitBlockEditing();
    savePlotData();
  });

  bToggle.addEventListener('mousedown', e => {
    if (blockEditing) { e.preventDefault(); blockDeletePending = true; }
  });
  bToggle.addEventListener('touchstart', () => {
    if (blockEditing) blockDeletePending = true;
  }, { passive: true });
  bToggle.addEventListener('click', e => {
    e.stopPropagation();
    if (blockDeletePending) {
      blockDeletePending = false;
      exitBlockEditing();
      openConfirmDeleteDialog('이 내용을 삭제하시겠습니까?', () => {
        const allParts = [...getPlotGroups().flatMap(g => g.parts), ...getPlotEtcParts()];
        for (const p of allParts) {
          const i = p.blocks.findIndex(b => b.id === block.id);
          if (i !== -1) { p.blocks.splice(i, 1); break; }
        }
        renderPlotList();
        savePlotData();
      });
    } else if (!blockEditing) {
      // 접기/펼치기 - editing 진입 없이 토글만
      block.expanded = !block.expanded;
      bToggle.classList.toggle('expanded', block.expanded);
      preview.style.display = block.expanded ? 'none' : '';
      ta.style.display = block.expanded ? '' : 'none';
      if (block.expanded) {
        setTimeout(() => {
          ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px';
        }, 0);
      }
    }
  });

  setTimeout(() => { if (block.expanded) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; } }, 0);

  const contentWrap = document.createElement('div');
  contentWrap.style.cssText = 'flex:1; min-width:0;';
  contentWrap.appendChild(preview);
  contentWrap.appendChild(ta);

  row.appendChild(bToggle);
  row.appendChild(contentWrap);
  wrap.appendChild(row);

  attachPlotLongPress(wrap, block.id, 'block', block.content.slice(0, 20) || '내용 블록');
  return wrap;
}

function makePlotInd(level, parentId, afterId, groupId) {
  const el = document.createElement('div');
  el.className = 'plot-drop-indicator';
  el.dataset.level = level;
  if (parentId) el.dataset.parent = parentId;
  if (afterId)  el.dataset.after  = afterId;
  if (groupId)  el.dataset.group  = groupId;
  return el;
}

// ── CRUD ──
function addPlotGroup() {
  getPlotGroups().push({ id: 'pgrp-' + Date.now(), name: '새 그룹', expanded: true, parts: [] });
  renderPlotList();
  savePlotData();
}
function addPlotPart(groupId) {
  const group = getPlotGroups().find(g => g.id === groupId);
  if (group) {
    group.expanded = true;
    group.parts.push({ id: 'part-' + Date.now(), title: '새 파트', expanded: true,
      blocks: [{ id: 'blk-' + Date.now(), content: '', expanded: true }] });
    renderPlotList();
  }
}
function addPlotBlock(groupId, partId) {
  const group = getPlotGroups().find(g => g.id === groupId);
  const part  = group?.parts.find(p => p.id === partId);
  if (part) { part.expanded = true; part.blocks.push({ id: 'blk-' + Date.now(), content: '', expanded: true }); renderPlotList(); }
}

// ── 그룹 컨텍스트 팝업 ──
let plotGroupCtxId = null;
let plotGroupCtxIsEtc = false;
function openPlotGroupPopup(e, groupId, isEtc = false) {
  e.stopPropagation();
  plotGroupCtxId = groupId;
  plotGroupCtxIsEtc = isEtc;
  const popup = document.getElementById('plotGroupPopup');
  popup.classList.add('open');
  popup.querySelector('[onclick="plotGroupRenameAction()"]').style.display = isEtc ? 'none' : '';
  popup.querySelector('[onclick="plotGroupDeleteAction()"]').style.display = isEtc ? 'none' : '';
  const rect = e.currentTarget.getBoundingClientRect();
  popup.style.top  = (rect.bottom + 4) + 'px';
  popup.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
}
function closePlotGroupPopup() { document.getElementById('plotGroupPopup').classList.remove('open'); plotGroupCtxId = null; }
function plotGroupRenameAction() {
  if (!plotGroupCtxId) return;
  const group = getPlotGroups().find(g => g.id === plotGroupCtxId);
  const gid = plotGroupCtxId;
  closePlotGroupPopup();
  if (!group) return;
  // 인라인 input으로 이름 변경
  const titleEl = document.querySelector(`.plot-group-header[data-group-id="${gid}"] .plot-group-title`);
  if (!titleEl) return;
  const currentName = group.name;
  const input = document.createElement('input');
  input.type = 'text'; input.value = currentName;
  input.style.cssText = 'flex:1;border:none;outline:none;background:none;font-family:inherit;font-size:14px;font-weight:700;color:inherit;padding:0;min-width:0;';
  titleEl.replaceWith(input); input.focus(); input.select();
  let committed = false;
  const commit = () => {
    if (committed) return; committed = true;
    group.name = input.value.trim() || currentName;
    renderPlotList();
    savePlotData();
  };
  input.addEventListener('blur', () => setTimeout(commit, 0));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }

}
function plotGroupDeleteAction() {
  if (!plotGroupCtxId) return;
  const groups = getPlotGroups();
  const idx = groups.findIndex(g => g.id === plotGroupCtxId);
  closePlotGroupPopup();
  if (idx !== -1) { groups.splice(idx, 1); renderPlotList(); savePlotData(); }

function plotGroupAddPartAction() {

// ── 드래그 ──
let plotDrag = null;

function attachPlotLongPress(el, id, type, name) {
  let timer = null;
  const onStart = e => {
    // 버튼은 항상 드래그 막기
    if (e.target.closest('button')) return;
    // input/textarea는 readOnly일 때만 드래그 허용
    const field = e.target.closest('input, textarea');
    if (field && !field.readOnly) return;
    const touch = e.touches ? e.touches[0] : e;
    timer = setTimeout(() => {
      e.preventDefault();
      startPlotDrag(id, type, name, el, touch.clientX, touch.clientY);
    }, 500);
  };
  const onCancel = () => { clearTimeout(timer); timer = null; };
  el.addEventListener('touchstart', onStart, { passive: true });
  el.addEventListener('touchend',   onCancel);
  el.addEventListener('touchmove',  onCancel, { passive: true });
  el.addEventListener('mousedown',  onStart);
  el.addEventListener('mouseup',    onCancel);
  el.addEventListener('mousemove',  onCancel);
}

function startPlotDrag(id, type, name, srcEl, x, y) {
  const iconMap = {
    group: `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
    part:  `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>`,
    block: `<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>`,
  };
  const ghost = document.createElement('div');
  ghost.className = 'plot-drag-ghost';
  ghost.innerHTML = iconMap[type] + `<span>${name}</span>`;
  ghost.style.left = (x - 20) + 'px';
  ghost.style.top  = (y - 20) + 'px';
  document.body.appendChild(ghost);
  srcEl.classList.add('plot-dragging');
  plotDrag = { id, type, srcEl, ghost };
  document.addEventListener('touchmove', onPlotDragMove, { passive: false });
  document.addEventListener('touchend',  onPlotDragEnd);
  document.addEventListener('mousemove', onPlotDragMove);
  document.addEventListener('mouseup',   onPlotDragEnd);
}

function onPlotDragMove(e) {
  if (!plotDrag) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const x = touch.clientX, y = touch.clientY;
  plotDrag.ghost.style.left = (x - 20) + 'px';
  plotDrag.ghost.style.top  = (y - 20) + 'px';

  document.querySelectorAll('.plot-drop-indicator.visible').forEach(el => el.classList.remove('visible', 'indented', 'indented2'));
  document.querySelectorAll('.plot-group-drop-target,.plot-part-drop-target').forEach(el => el.classList.remove('plot-group-drop-target','plot-part-drop-target'));

  const groupHeaders = [...document.querySelectorAll('.plot-group-header')];
  const partEls      = [...document.querySelectorAll('.plot-part')];

  if (plotDrag.type === 'group') {
    // 그룹: top-group 인디케이터만
    const inds = [...document.querySelectorAll('.plot-drop-indicator[data-level="top-group"]')];
    let cl = null, cd = Infinity;
    inds.forEach(ind => { const r = ind.getBoundingClientRect(); const d = Math.abs(y - (r.top + r.height/2)); if (d < cd) { cd = d; cl = ind; } });
    if (cl) cl.classList.add('visible');

  } else if (plotDrag.type === 'part') {
    // 파트: 그룹 헤더 3등분 or child 인디케이터
    let handled = false;
    for (const gh of groupHeaders) {
      const r = gh.getBoundingClientRect();
      if (y < r.top || y > r.bottom) continue;
      const third = r.height / 3;
      const groupId = gh.dataset.groupId;
      const group = groupId === '__etc_plot__'
        ? { expanded: PLOT_ETC_STATE[PROJECT_ID]?.expanded ?? true }
        : getPlotGroups().find(g => g.id === groupId);
      const isExpanded = group?.expanded;
      if (y < r.top + third) {
        const ind = document.querySelector(`.plot-drop-indicator[data-level="top-group"][data-before-group="${groupId}"]`);
        if (ind) ind.classList.add('visible');
      } else if (y > r.bottom - third) {
        if (isExpanded) {
          const childInds = [...document.querySelectorAll(`.plot-drop-indicator[data-level="child"][data-parent="${groupId}"]`)];
          if (childInds.length >= 2) { const last = childInds[childInds.length-1]; last.classList.add('visible'); }
          else { const ind = findNextPlotInd(gh, 'top-group'); if (ind) ind.classList.add('visible'); }
        } else { const ind = findNextPlotInd(gh, 'top-group'); if (ind) ind.classList.add('visible'); }
      } else { gh.classList.add('plot-group-drop-target'); }
      handled = true; break;
    }
    if (!handled) {
      const inds = [...document.querySelectorAll('.plot-drop-indicator[data-level="child"]')];
      let cl = null, cd = Infinity;
      inds.forEach(ind => { const r = ind.getBoundingClientRect(); const d = Math.abs(y - (r.top + r.height/2)); if (d < cd) { cd = d; cl = ind; } });
      if (cl) cl.classList.add('visible');
    }

  } else {
    // 블록: 카드(파트) 내부에서만 이동 가능
    // 파트 카드 위에 있는지 확인
    let handled = false;
    for (const pe of partEls) {
      const r = pe.getBoundingClientRect();
      if (y < r.top || y > r.bottom) continue;
      const partId  = pe.dataset.partId;
      const groupId = pe.dataset.groupId;
      const group   = getPlotGroups().find(g => g.id === groupId);
      const part    = group?.parts.find(p => p.id === partId);

      // 파트가 접혀있으면 테두리 인디케이터 (드롭 시 블록 최하단)
      if (!part?.expanded) {
        pe.classList.add('plot-part-drop-target');
      } else {
        // 펼쳐진 파트: block 인디케이터 중 가장 가까운 것
        const blockInds = [...document.querySelectorAll(`.plot-drop-indicator[data-level="block"][data-parent="${partId}"]`)];
        if (blockInds.length) {
          let cl = null, cd = Infinity;
          blockInds.forEach(ind => {
            const br = ind.getBoundingClientRect();
            const d = Math.abs(y - (br.top + br.height / 2));
            if (d < cd) { cd = d; cl = ind; }
          });
          if (cl) cl.classList.add('visible');
        } else {
          pe.classList.add('plot-part-drop-target');
        }
      }
      handled = true; break;
    }
    // 파트 밖이면 아무 인디케이터도 표시 안 함
  }
}

function findNextPlotInd(el, level) {
  // 형제 탐색 - childWrap(div[data-group-id]) 도 건너뜀
  let n = el.nextElementSibling;
  while (n) {
    if (n.classList.contains('plot-drop-indicator') && n.dataset.level === level) return n;
    // childWrap이면 건너뛰고 계속
    n = n.nextElementSibling;
  }
  // 못 찾으면 부모의 형제에서 탐색 (childWrap 안에 있는 경우)
  if (el.parentElement && el.parentElement.dataset.groupId) {
    let p = el.parentElement.nextElementSibling;
    while (p) {
      if (p.classList.contains('plot-drop-indicator') && p.dataset.level === level) return p;
      p = p.nextElementSibling;
    }
  }
  return null;
}

function onPlotDragEnd() {
  if (!plotDrag) return;
  const ind         = document.querySelector('.plot-drop-indicator.visible');
  const groupTarget = document.querySelector('.plot-group-drop-target');
  const partTarget  = document.querySelector('.plot-part-drop-target');
  const { id, type } = plotDrag;
  const groups = getPlotGroups();

  if (type === 'group' && ind) {
    const beforeGroupId = ind.dataset.beforeGroup || null;
    const idx = groups.findIndex(g => g.id === id);
    if (idx !== -1) {
      const [moved] = groups.splice(idx, 1);
      if (beforeGroupId) { const ti = groups.findIndex(g => g.id === beforeGroupId); groups.splice(Math.max(0, ti), 0, moved); }
      else groups.push(moved);
    }
  } else if (type === 'part') {
    // 원본 찾기 (기타 포함)
    let fromGroup = null, fromIdx = -1, fromEtc = false;
    for (const g of groups) { const i = g.parts.findIndex(p => p.id === id); if (i !== -1) { fromGroup = g; fromIdx = i; break; } }
    if (!fromGroup) {
      const etcParts = getPlotEtcParts();
      const i = etcParts.findIndex(p => p.id === id);
      if (i !== -1) { fromIdx = i; fromEtc = true; }
    }
    if (fromIdx !== -1) {
      const srcArr = fromEtc ? getPlotEtcParts() : fromGroup.parts;
      if (groupTarget) {
        const toGroupId = groupTarget.dataset.groupId;
        if (toGroupId === '__etc_plot__') {
          const [moved] = srcArr.splice(fromIdx, 1);
          getPlotEtcParts().push(moved);
        } else {
          const toGroup = groups.find(g => g.id === toGroupId);
          if (toGroup) { const [moved] = srcArr.splice(fromIdx, 1); toGroup.expanded = true; toGroup.parts.push(moved); }
        }
      } else if (ind && ind.dataset.level === 'child') {
        const toGroupId = ind.dataset.parent;
        const afterId   = ind.dataset.after || null;
        if (toGroupId === '__etc_plot__') {
          const [moved] = srcArr.splice(fromIdx, 1);
          const etcParts = getPlotEtcParts();
          if (afterId) { const ai = etcParts.findIndex(p => p.id === afterId); etcParts.splice(ai + 1, 0, moved); }
          else etcParts.unshift(moved);
        } else {
          const toGroup = groups.find(g => g.id === toGroupId);
          if (toGroup) {
            const [moved] = srcArr.splice(fromIdx, 1);
            if (afterId) { const ai = toGroup.parts.findIndex(p => p.id === afterId); toGroup.parts.splice(ai + 1, 0, moved); }
            else toGroup.parts.unshift(moved);
          }
        }
      }
      // 드롭 위치 없으면 원위치 유지
    }
  } else if (type === 'block') {
    let moved = null, fromPart = null, fromIdx = -1;
    const allParts = [...groups.flatMap(g => g.parts), ...getPlotEtcParts()];
    for (const p of allParts) {
      const i = p.blocks.findIndex(b => b.id === id);
      if (i !== -1) { moved = p.blocks[i]; fromPart = p; fromIdx = i; break; }
    }
    if (moved) {
      if (partTarget) {
        // 접힌 파트 테두리 → 해당 파트 최하단
        const toGroupId = partTarget.dataset.groupId;
        const toPartId  = partTarget.dataset.partId;
        const toPart    = groups.find(g => g.id === toGroupId)?.parts.find(p => p.id === toPartId);
        if (toPart && toPart !== fromPart) {
          fromPart.blocks.splice(fromIdx, 1);
          toPart.expanded = true; toPart.blocks.push(moved);
        }
        // 같은 파트면 그대로
      } else if (ind && ind.dataset.level === 'block') {
        const toPartId  = ind.dataset.parent;
        const afterId   = ind.dataset.after || null;
        const toGroupId = ind.dataset.group;
        // 일반 그룹 파트 탐색, 없으면 기타 그룹 파트에서 탐색
        const toPart = toGroupId === '__etc_plot__'
          ? getPlotEtcParts().find(p => p.id === toPartId)
          : groups.find(g => g.id === toGroupId)?.parts.find(p => p.id === toPartId);
        if (toPart) {
          fromPart.blocks.splice(fromIdx, 1);
          if (afterId) { const ai = toPart.blocks.findIndex(b => b.id === afterId); toPart.blocks.splice(ai + 1, 0, moved); }
          else toPart.blocks.unshift(moved);
        }
      }
      // 파트 밖 드롭: 아무것도 안 함 (원위치 유지)
    }
  }

  plotDrag.ghost.remove();
  plotDrag.srcEl.classList.remove('plot-dragging');
  document.querySelectorAll('.plot-drop-indicator.visible').forEach(el => el.classList.remove('visible','indented'));
  document.querySelectorAll('.plot-group-drop-target,.plot-part-drop-target').forEach(el => el.classList.remove('plot-group-drop-target','plot-part-drop-target'));
  plotDrag = null;
  document.removeEventListener('touchmove', onPlotDragMove);
  document.removeEventListener('touchend',  onPlotDragEnd);
  document.removeEventListener('mousemove', onPlotDragMove);
  document.removeEventListener('mouseup',   onPlotDragEnd);
  renderPlotList();
  savePlotData();
}
function serializeBlocks() {
  const con = document.getElementById('blockContainer');
  if (!con) return [];
  const blocks = [];
  con.querySelectorAll('.block-card').forEach(el => {
    const type = el.dataset.type;
    if (!type) return;
    const data = { type };
    switch (type) {
      case 'name':
        data.value = el.querySelector('input')?.value || '';
        break;
      case 'content':
        data.value = el.querySelector('textarea')?.value || '';
        break;
      case 'tag':
        data.tags = [...el.querySelectorAll('.tag-chip')]
          .map(c => c.childNodes[0].textContent.trim()).filter(Boolean);
        break;
      case 'related-person': case 'related-setting':
      case 'related-region': case 'related-event':
        data.values = getMultiSelectValues(el.querySelector('.multi-select-wrap'));
        data.value  = data.values[0] || ''; // 하위 호환
        break;
      case 'period': {
        const row = el.querySelector('.period-separate-row');
        data.era    = row?.querySelector('.era-select-wrap .multi-select-btn-text')?.textContent?.trim() || '';
        data.year   = el.querySelector('.year-input')?.value || '';
        data.season = row?.querySelector('.season-select-wrap .multi-select-btn-text')?.textContent?.trim() || '';
        // 기본값 제거
        if (data.era === '연호없음') data.era = '';
        if (data.season === '-') data.season = '';
        break;
      }
      case 'image':
        data.srcs = [...el.querySelectorAll('.image-item img')].map(img => img.src).filter(Boolean);
        break;
    }
    blocks.push(data);
  });
  return { fixedTags: [], blocks };
}

// ── 블록 데이터 복원 (저장된 JSON → 편집창) ──
function restoreBlocks(savedData) {
  if (!savedData || !savedData.blocks) return;
  const cfg = DETAIL_CONFIG[currentType];

  // 기본 블록 제외한 추가 블록 복원
  const defaultTypes = cfg?.defaultBlocks || [];
  savedData.blocks
    .filter(b => !defaultTypes.includes(b.type))
    .forEach(b => {
      addedBlocks.add(b.type);
      const block = makeEditBlock(b.type, false);
      const btn = document.getElementById('addBlockBtn');
      btn.parentNode.insertBefore(block, btn);
      initDrag(block);
    });

  // 값 복원
  const con = document.getElementById('blockContainer');
  con.querySelectorAll('.block-card').forEach(el => {
    const type = el.dataset.type;
    const saved = savedData.blocks.find(b => b.type === type);
    if (!saved) return;
    switch (type) {
      case 'name':
        if (saved.value) { const input = el.querySelector('input'); if (input) input.value = saved.value; }
        break;
      case 'content':
        if (saved.value) { const ta = el.querySelector('textarea'); if (ta) ta.value = saved.value; }
        break;
      case 'tag':
        if (saved.tags?.length) {
          const wrap = el.querySelector('.tag-input-wrap');
          const input = wrap?.querySelector('input');
          saved.tags.forEach(tag => {
            const chip = document.createElement('span');
            chip.className = 'tag-chip';
            chip.innerHTML = tag + ' <span class="tag-x" onclick="removeTag(this)">×</span>';
            wrap.insertBefore(chip, input);
          });
        }
        break;
      case 'related-person': case 'related-setting':
      case 'related-region': case 'related-event': {
        const vals = saved.values || (saved.value ? [saved.value] : []);
        if (vals.length) setMultiSelectValues(el.querySelector('.multi-select-wrap'), vals);
        break;
      }
      case 'period': {
        const row = el.querySelector('.period-separate-row');
        if (row) {
          if (saved.era)    setSingleSelectValue(row.querySelector('.era-select-wrap'), saved.era);
          if (saved.season) setSingleSelectValue(row.querySelector('.season-select-wrap'), saved.season);
        }
        if (saved.year) { const yi = el.querySelector('.year-input'); if (yi) yi.value = saved.year; }
        break;
      }
      case 'image':
        if (saved.srcs?.length) {
          const row = el.querySelector('.image-scroll-row');
          const addBtn = row?.querySelector('.image-add-btn');
          saved.srcs.forEach(src => {
            const item = document.createElement('div');
            item.className = 'image-item';
            item.innerHTML = `<img src="${src}" alt=""><button class="image-item-remove" onclick="removeImageItem(this)">✕</button>`;
            row.insertBefore(item, addBtn);
          });
        }
        break;
    }
  });
}

// ── 상세 열기 ──
let currentItemId = null;
let currentDetailMode = 'item'; // 'item' | 'story'
let currentStoryId = null;

function openDetail(item) {
  currentItemId = item.id;
  currentDetailMode = 'item';
  currentStoryId = null;
  initDetail(item.type);

  // 저장된 블록 데이터 복원
  if (item.blocks) restoreBlocks(item.blocks);

  // 읽기창 구성
  const readBody = document.getElementById('readBody');
  readBody.innerHTML = '';
  const con = document.getElementById('blockContainer');
  con.querySelectorAll('.block-card').forEach(editBlock => {
    const type = editBlock.dataset.type; if (!type) return;
    const readBlock = buildReadBlockEl(type, editBlock);
    if (readBlock) readBody.appendChild(readBlock);
  });

  document.getElementById('page-detail').classList.add('open');
}

function openStoryDetail(storyId) {
  closeMenu();
  currentDetailMode = 'story';
  currentStoryId = storyId;
  currentItemId = null;

  // STORY_DB에서 이야기 메타 찾기
  if (!STORY_META[storyId]) STORY_META[storyId] = {};
  const meta = STORY_META[storyId];

  initDetail('이야기');

  // 저장된 블록 데이터 복원
  if (meta.blocks) restoreBlocks(meta.blocks);

  // 읽기창 구성
  const readBody = document.getElementById('readBody');
  readBody.innerHTML = '';
  const con = document.getElementById('blockContainer');
  con.querySelectorAll('.block-card').forEach(editBlock => {
    const type = editBlock.dataset.type; if (!type) return;
    const readBlock = buildReadBlockEl(type, editBlock);
    if (readBlock) readBody.appendChild(readBlock);
  });

  document.getElementById('page-detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('page-detail').classList.remove('open');
  currentItemId = null;
  currentStoryId = null;
  currentDetailMode = 'item';
}

// ── 저장 후 카드 업데이트 ──
async function onDetailSaved(name, desc, blocksData) {
  if (!currentItemId) return;
  await saveItem(currentItemId, name, desc, blocksData);
  const item = ITEMS.find(i => i.id === currentItemId);
  const q = document.querySelector('.search-input-box input').value.trim();
  onSearch(q);
  if (item && item.type === '인물') renderPersonList();
  if (item && item.type === '사건') renderTimelinePage();
  // 지역 저장 시 지도뷰가 열려 있으면 핀 이름 갱신
  if (item && item.type === '지역') {
    const mapBody = document.getElementById('settingMapBody');
    if (mapBody && mapBody.classList.contains('active')) renderMapView();
  }
}

// ── 이야기 상세 저장 ──
function onStoryDetailSaved(storyId, name, desc, blocksData) {
  if (!storyId) return;
  if (!STORY_META[storyId]) STORY_META[storyId] = {};
  STORY_META[storyId].blocks = blocksData;
  // 이야기 이름 업데이트
  MENU_DATA.forEach(item => {
    if (item.type === 'story' && item.id === storyId) item.name = name || item.name;
    if (item.type === 'group') item.children.forEach(s => { if (s.id === storyId) s.name = name || s.name; });
  });
  // 상단바 타이틀 업데이트 (현재 선택된 이야기인 경우)
  if (storyId === PROJECT_ID) {
    const titleEl = document.getElementById('sharedTopBarTitle');
    if (titleEl && name) titleEl.textContent = name;
  }
  // Firebase 저장
  ref.meta(storyId).set(STORY_META[storyId]);
  saveMenuData();
}

function buildReadBlockEl(type, editBlock) {
  const div = document.createElement('div');
  div.className = 'block-card'; div.dataset.type = type;
  const cfg = DETAIL_CONFIG[currentType];
  const labelMap = { 'tag':'태그','related-person':'관련인물','related-setting':'관련설정','related-region':'관련지역','related-event':'관련사건','image':'이미지','period':'시점' };
  function elCreate(tag, cls, text, style) { const e=document.createElement(tag); if(cls) e.className=cls; if(text!==undefined) e.textContent=text; if(style) e.style.cssText=style; return e; }
  switch(type) {
    case 'name': {
      const input = editBlock ? editBlock.querySelector('input') : null;
      const val = input ? input.value.trim() : '';
      const p = elCreate('p','read-name', val||'—');
      p.id = 'readName';
      if (!val) p.style.color = 'var(--text-secondary)';
      div.appendChild(p); break;
    }
    case 'content': {
      const textarea = editBlock ? editBlock.querySelector('textarea') : null;
      const val = textarea ? textarea.value.trim() : '';
      const p = elCreate('p','read-content', val||'—');
      p.id = 'readContent';
      if (!val) p.style.color = 'var(--text-secondary)';
      div.appendChild(p); break;
    }
    case 'tag': {
      const chips = editBlock ? [...editBlock.querySelectorAll('.tag-chip')].map(c=>c.childNodes[0].textContent.trim()).filter(Boolean) : [];
      const p = elCreate('p','read-tags', chips.length ? chips.join(', ') : '—'); if(!chips.length) p.style.color='var(--text-secondary)'; div.appendChild(p); break;
    }
    case 'related-person': case 'related-setting': case 'related-region': case 'related-event': {
      div.appendChild(elCreate('div','block-label',labelMap[type]));
      const wrap = editBlock?.querySelector('.multi-select-wrap');
      const selectedIds = wrap ? getMultiSelectValues(wrap) : [];
      const names = selectedIds.map(id => ITEMS.find(i => i.id === id)?.name || id).filter(Boolean);
      if (names.length) { const list=elCreate('div','related-list'); names.forEach(n=>list.appendChild(elCreate('span','related-chip',n))); div.appendChild(list); }
      else div.appendChild(elCreate('p','read-content','—','color:var(--text-secondary)'));
      break;
    }
    case 'image': {
      const srcs = [...(editBlock?.querySelectorAll('.image-item img') || [])].map(img => img.src).filter(Boolean);
      if (srcs.length) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;height:160px;gap:6px;scrollbar-width:none;';
        srcs.forEach((src, i) => {
          const item = document.createElement('div');
          item.style.cssText = 'flex-shrink:0;height:100%;border-radius:6px;overflow:hidden;cursor:pointer;';
          item.onclick = () => openImageViewer(srcs, i);
          const img = document.createElement('img');
          img.src = src;
          img.style.cssText = 'height:100%;width:auto;display:block;object-fit:contain;';
          item.appendChild(img);
          row.appendChild(item);
        });
        div.appendChild(row);
      }
      break;
    }
    case 'period': {
      div.appendChild(elCreate('div','block-label','시점'));
      const row = editBlock?.querySelector('.period-separate-row');
      const eraVal    = row?.querySelector('.era-select-wrap .multi-select-btn-text')?.textContent?.trim() || '';
      const yearVal   = editBlock?.querySelector('.year-input')?.value?.trim() || '';
      const seasonVal = row?.querySelector('.season-select-wrap .multi-select-btn-text')?.textContent?.trim() || '';
      const parts = [
        eraVal !== '연호없음' ? eraVal : '',
        yearVal ? yearVal+'년' : '',
        seasonVal !== '-' ? seasonVal : ''
      ].filter(Boolean);
      const p = elCreate('p','read-content', parts.length?parts.join(' '):'—');
      if (!parts.length) p.style.color='var(--text-secondary)';
      div.appendChild(p); break;
    }
    default: return null;
  }
  return div;
}

let TRASH = [];

function trashItem(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item) return;
  const isPersonTab = currentTab === 'person';
  TRASH.unshift({
    id: item.id,
    name: item.name || '명칭 없음',
    type: item.type,
    deletedAt: Date.now(),
    storyId: PROJECT_ID,
    data: JSON.parse(JSON.stringify(item)),
  });
  // 인물 그룹에서도 제거
  const groups = getPersonGroups();
  groups.forEach(g => { g.personIds = g.personIds.filter(pid => pid !== id); });
  if (item.type === '인물') savePersonGroups();
  ITEMS = ITEMS.filter(i => i.id !== id);
  STORY_DB[PROJECT_ID] = ITEMS;
  renderList(ITEMS);
  if (isPersonTab || item.type === '인물') renderPersonList();
  // Firebase에서 삭제
  deleteItem(id);
}

async function confirmDelete() {
  closeDeleteSheet();
  if (currentDetailMode === 'story') {
    if (!currentStoryId) return;
    // 이야기를 메뉴에서 삭제 (ctxDeleteAction과 동일 흐름)
    let story = null;
    MENU_DATA = MENU_DATA.filter(i => {
      if (i.type === 'story' && i.id === currentStoryId) { story = i; return false; }
      return true;
    });
    if (!story) {
      MENU_DATA.forEach(i => {
        if (i.type === 'group') {
          const ci = i.children.findIndex(c => c.id === currentStoryId);
          if (ci !== -1) { story = i.children[ci]; i.children.splice(ci, 1); }
        }
      });
    }
    if (story) {
      TRASH.unshift({
        id: story.id, name: story.name, type: '이야기',
        deletedAt: Date.now(), storyId: story.id,
        data: JSON.parse(JSON.stringify(story)),
        itemsData: JSON.parse(JSON.stringify(STORY_DB[story.id] || [])),
      });
      delete STORY_DB[story.id];
      delete STORY_META[story.id];
      if (PROJECT_ID === story.id) {
        PROJECT_ID = null;
        ITEMS = [];
        setNoStoryMode(true);
      }
    }
    renderMenuList();
    closeDetail();
  } else {
    if (!currentItemId) return;
    trashItem(currentItemId);
    closeDetail();
  }
}

function openTrash() {
  closeMenu();
  // 30일(밀리초) 지난 항목 자동 영구삭제
  const THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
  TRASH = TRASH.filter(i => (Date.now() - i.deletedAt) < THIRTY_DAYS);
  renderTrash();
  document.getElementById('page-trash').classList.add('open');
}
function closeTrash() {
  document.getElementById('page-trash').classList.remove('open');
  closeTrashContextPopup();
}

function relativeTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return '방금 전';
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  if (diff < 604800) return Math.floor(diff / 86400) + '일 전';
  return Math.floor(diff / 604800) + '주 전';
}

  const body = document.getElementById('trashBody');

        </tr>

  `;

}

// 휴지통 컨텍스트 팝업
let trashCtxId = null;
function openTrashContextPopup(e, id) {
  e.stopPropagation();
  trashCtxId = id;
  const popup = document.getElementById('trashContextPopup');
  popup.classList.add('open');
  const rect = e.currentTarget.getBoundingClientRect();
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.right = '15px';
  popup.style.left = 'auto';
}
function closeTrashContextPopup() {
  document.getElementById('trashContextPopup').classList.remove('open');
  trashCtxId = null;
}
function trashCtxRestore() {
  if (!trashCtxId) return;
  const item = TRASH.find(i => i.id === trashCtxId);
  closeTrashContextPopup();
  if (!item) return;

  if (item.type === '그룹') {
    MENU_DATA.push(item.data);
    renderMenuList();
  } else if (item.type === '이야기') {
    MENU_DATA.push(item.data);
    if (item.itemsData) STORY_DB[item.id] = item.itemsData;
    renderMenuList();
  } else {
    // 인물/사건/설정/지역
    if (!STORY_DB[item.storyId]) STORY_DB[item.storyId] = [];
    STORY_DB[item.storyId].push(item.data);
    if (item.storyId === PROJECT_ID) {
      ITEMS = STORY_DB[PROJECT_ID];
      renderList(ITEMS);
      if (item.type === '인물') renderPersonList();
    }
    // Firebase에 복원
    const sid = item.storyId;
    if (sid) {
      const order = (STORY_DB[sid] || []).length - 1;
      ref.item(sid, item.data.id).set({ ...item.data, _order: order });
    }
  }
  TRASH = TRASH.filter(i => i.id !== item.id);
  renderTrash();
}

function trashCtxDelete() {
  if (!trashCtxId) return;
  openConfirmDeleteDialog(); // permDeleteId 저장 먼저
  closeTrashContextPopup(); // 그 다음 trashCtxId 초기화
}

document.addEventListener('click', e => {
  const tp = document.getElementById('trashContextPopup');

function tagKeyup(e) {
  if (e.key!==',') return;
  const input=e.target; const val=input.value.replace(',','').trim(); if(!val) return;
  const chip=document.createElement('span'); chip.className='tag-chip';
  chip.innerHTML=val+' <span class="tag-x" onclick="removeTag(this)">×</span>';
  input.parentNode.insertBefore(chip,input); input.value='';
}
